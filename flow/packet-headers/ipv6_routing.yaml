components:
  schemas:
    Flow.Ipv6ExtHeader:
      description: IPv6 Extension header should be preceded either by IPv6 header or other
        IPv6 Extension headers and the next_header in that preceding header should be set
        to the correct value depending on the type of extension header configured. This will
        be automatically handled by implementation if next_header choice is set to auto.
        For Routing Extension header this value is 43.
      type: object
      properties:
        choice:
          type: string
          default: routing
          x-field-uid: 1
          x-enum:
            routing:
              x-field-uid: 1
        next_header:
          x-field-pattern:
            description: The next header that identifies the type of header immediately
              following this IPv6 Extension header. For TCP and UDP the values are 6 and 17 respectively.
              A value of 59 indicates that there are no further IPv6 Extension headers and that the
              payload will be appended after this header. The available defined values are listed in
              https://www.iana.org/assignments/ipv6-parameters/ipv6-parameters.xhtml#extension-header
            format: integer
            length: 8
            default: 59
            x-constants:
              tcp: 6
              udp: 17
              ipv6: 41
              ipv6_route: 43
              ipv6_frag: 44
              esp: 50
              ah: 51
              ipv6_icmp: 58
              ipv6_nonxt: 59
              ipv6_opts: 60
              mobility_header: 135
              sctp: 132
            features: [auto, count]
          x-field-uid: 2
        hdr_ext_len:
          x-field-pattern:
            description: The length of the IPv6 Extension header in 8 octet units, not including the first 8 octets
              of the Extension Header itself ( refer RFC 8200 ). When auto is assigned the implementation should
              automatically set it to the correct value.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 3
        routing:
          $ref: '#/components/schemas/Flow.Ipv6Routing'
          x-field-uid: 4
    Flow.Ipv6Routing:
      description: IPv6 routing packet headers.
      type: object
      properties:
        choice:
          type: string
          default: segment_routing
          x-field-uid: 1
          x-enum:
            segment_routing:
              x-field-uid: 1
            segment_routing_usid:
              x-field-uid: 2
        segment_routing:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting'
          x-field-uid: 2
        segment_routing_usid:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid'
          x-field-uid: 3
    Flow.Ipv6SegmentRouting:
      description: |-
        IPv6 Segment Routing Header (SRH) with full 128-bit Segment IDs
        (RFC 8754 Section 2). Each segment list entry carries a complete SRv6 SID
        (locator + function + argument) as a 128-bit IPv6 address.
        The Routing Type field is always 4 (RFC 8754 Section 2.1).

        Packet stack example - 2-SID path (H.Encaps, Node1 then Node2 then receiver):

        ```
        +--------------------------------------------------+
        | Ethernet                                         |
        +--------------------------------------------------+
        | Outer IPv6                                       |
        |   next_header : 43 (Routing Extension Header)   |
        |   dst         : fc00:0:1::  (Segment[1], active)|
        +--------------------------------------------------+
        | SRH (Routing Type 4)                            |
        |   segments_left : 1  (auto = num segments - 1)  |
        |   last_entry    : 1  (auto = num segments - 1)  |
        |   flags, tag    : 0                             |
        |   Segment[0]    : fc00:0:2::  (last hop)        |
        |   Segment[1]    : fc00:0:1::  (first hop)       |
        +--------------------------------------------------+
        | Inner payload (IPv4, IPv6, etc.)                 |
        +--------------------------------------------------+
        ```

        The outer IPv6 dst is set to Segment[segments_left], which is the first
        SID to visit. At each hop, segments_left is decremented and dst is
        updated to the next SID. The segment list is encoded in reverse path
        order: Segment[0] is the last hop, Segment[n-1] is the first hop.
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: >-
              Number of route segments remaining before the packet reaches its
              final destination (RFC 8754 Section 2.1). Decremented at each
              segment endpoint. When auto is assigned the value is set to the
              number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: >-
              Zero-based index of the last element in the Segment List
              (RFC 8754 Section 2.1). For example, a list of 3 SIDs has
              Last Entry = 2. When auto is assigned the value is set to
              one less than the number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Flags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: >-
              16-bit field used to tag a packet as part of a class or group
              (RFC 8754 Section 2.1). If not used it MUST be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: >-
            List of 128-bit SRv6 SID addresses (RFC 8754 Section 2.1), encoded
            in reverse path order: Segment[0] is the last segment of the SR
            Policy, Segment[n-1] is the first segment to visit.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Segment'
          x-field-uid: 5
    Flow.Ipv6SegmentRoutingUsid:
      description: |-
        IPv6 Segment Routing Header (SRH) with uSID containers (RFC 9800 Section 4).
        Each segment list entry is a pre-computed 128-bit uSID container value
        supplied as a plain IPv6 address. The container packs multiple Micro-SIDs
        but appears on the wire as a single 128-bit address - no decomposition
        fields (locator block length, node length, function length) are present
        in the packet. The user pre-computes the container value and supplies it
        directly, allowing raw traffic generation independent of any control
        plane configuration on the emulated device.
        The Routing Type field is always 4 (RFC 8754 Section 2.1).

        Packet stack example - 1 container (F3216, Node2 + Node3 packed into one container):

        Container value assembly (done by user, outside the schema):
          lb=fc00::/32 | node2-fn1 (0002:0001) | node3-fn1 (0003:0001) | zeros
          => fc00:0:2:1:3:1::

        ```
        +--------------------------------------------------+
        | Ethernet                                         |
        +--------------------------------------------------+
        | Outer IPv6                                       |
        |   next_header : 43 (Routing Extension Header)   |
        |   dst         : fc00:0:2:1:3:1:: (container)    |
        +--------------------------------------------------+
        | SRH (Routing Type 4)                            |
        |   segments_left : 0  (auto)                     |
        |   last_entry    : 0  (auto)                     |
        |   flags, tag    : 0                             |
        |   Segment[0]    : fc00:0:2:1:3:1::              |
        +--------------------------------------------------+
        | Inner payload (IPv4, IPv6, etc.)                 |
        +--------------------------------------------------+
        ```

        At Node2: reads first uSID (node2-fn1), shifts container left,
        outer dst becomes fc00:0:3:1::, forwards.
        At Node3: reads next uSID (node3-fn1), container exhausted,
        strips SRH, delivers payload.

        Packet stack example - 2 containers (3-hop path: Node2 + Node3, then Node4):

        ```
        +--------------------------------------------------+
        | Ethernet                                         |
        +--------------------------------------------------+
        | Outer IPv6                                       |
        |   dst : fc00:0:2:1:3:1:: (Segment[1], active)   |
        +--------------------------------------------------+
        | SRH (Routing Type 4)                            |
        |   segments_left : 1  (auto)                     |
        |   last_entry    : 1  (auto)                     |
        |   flags, tag    : 0                             |
        |   Segment[0]    : fc00:0:4:1::      (last hop)  |
        |   Segment[1]    : fc00:0:2:1:3:1::  (first)     |
        +--------------------------------------------------+
        | Inner payload (IPv4, IPv6, etc.)                 |
        +--------------------------------------------------+
        ```

        The segment list is encoded in reverse path order: Segment[0] is the
        last container (last hop), Segment[n-1] is the first container to visit.
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: >-
              Number of uSID containers remaining before the packet reaches its
              final destination (RFC 8754 Section 2.1). Decremented when the
              active container is exhausted and the next container becomes active.
              When auto is assigned the value is set to the number of containers
              specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: >-
              Zero-based index of the last element in the uSID container list
              (RFC 8754 Section 2.1). When auto is assigned the value is set to
              one less than the number of containers specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Flags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: >-
              16-bit field used to tag a packet as part of a class or group
              (RFC 8754 Section 2.1). If not used it MUST be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: >-
            List of pre-computed 128-bit uSID container values (RFC 9800 Section 4),
            encoded in reverse path order: Segment[0] is the last container
            (last hop), Segment[n-1] is the first container to visit.
            Each value is a plain IPv6 address supplied by the user.

            Maximum capacity per SRH (RFC 8754 Section 2.1):
            The hdr_ext_len field is 8 bits; the SRH total size is
            (hdr_ext_len + 1) x 8 bytes. With hdr_ext_len max = 255 the SRH
            can hold at most (255+1)*8 - 8 = 2040 bytes of segment list, giving
            a theoretical maximum of 127 containers (each 16 bytes).
            For F3216 (3 uSIDs per container) this is 127 x 3 = 381 micro-SIDs.
            In practice a standard Ethernet MTU of 1500 bytes limits the SRH to
            approximately 88 containers (~264 micro-SIDs for F3216) after
            accounting for the outer IPv6 header (40 bytes) and inner payload.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid.Segment'
          x-field-uid: 5
    Flow.Ipv6SegmentRouting.Segment:
      description: >-
        One entry in the SRH Segment List (RFC 8754 Section 2.1).
        A single 128-bit SRv6 SID address for full-SID encoding
        (locator + function + argument packed into one IPv6 address).
      type: object
      properties:
        segment:
          x-field-pattern:
            description: >-
              A 128-bit IPv6 SID address (RFC 8754 Section 2.1).
              Example: "2001:db8::1".
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 1
    Flow.Ipv6SegmentRoutingUsid.Segment:
      description: >-
        One pre-computed uSID container entry in the SRH Segment List
        (RFC 9800 Section 4, RFC 8754 Section 2.1). The 128-bit value
        encodes the locator block and packed micro-SIDs and is supplied
        as a plain IPv6 address. No decomposition metadata is carried
        on the wire.

        Maximum micro-SIDs per container (RFC 9800 Section 4):
          floor((128 - locator_block_length) /
                (locator_node_length + function_length))
        Common formats:
          F3216 (lb=32, ln=16, fn=16): floor(96/32) = 3 uSIDs per container.
          F4816 (lb=48, ln=16, fn=16): floor(80/32) = 2 uSIDs per container.
          F3208 (lb=32, ln=8,  fn=8 ): floor(96/16) = 6 uSIDs per container.

        Example (F3216, lb=fc00::/32, node2-fn1 packed with node3-fn1):
          fc00:0:2:1:3:1::
      type: object
      properties:
        segment:
          x-field-pattern:
            description: >-
              A pre-computed 128-bit uSID container value as an IPv6 address
              (RFC 9800 Section 4). Example: "fc00:0:2:1:3:1::".
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 1
    Flow.Ipv6SegmentRouting.Flags:
      description: >-
        8-bit flags field in the SRH (RFC 8754 Section 2.1). RFC 8754
        reserves all bits as unused; earlier drafts defined OAM, HMAC,
        and FRR protection flags.
      type: object
      properties:
        protected:
          x-field-pattern:
            description: Protected Flag. Indicates if the segment is protected
              by a Fast Re-Route (FRR) mechanism.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_protected: 0
              protected: 1
            features:
              - count
          x-field-uid: 1
        oam:
          x-field-pattern:
            description: OAM Flag. Indicates if the packet is an Operations, Administration,
              and Maintenance (OAM) packet.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_oam: 0
              oam: 1
            features:
              - count
          x-field-uid: 2
        alert:
          x-field-pattern:
            description: Alert Flag. Indicates the presence of important TLVs
              that must be inspected.
            format: integer
            length: 1
            default: 0
            x-constants:
              no_alert: 0
              alert: 1
            features:
              - count
          x-field-uid: 3
