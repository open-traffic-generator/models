components:
  schemas:
    Flow.Ipv6ExtHeader:
      description: IPv6 Extension header should be preceded either by IPv6 header or other
        IPv6 Extension headers and the next_header in that preceding header should be set
        to the correct value depending on the type of extension header configured. This will
        be automatically handled by implementation if next_header choice is set to auto.
        For Routing Extension header this value is 43.
      type: object
      properties:
        choice:
          type: string
          default: routing
          x-field-uid: 1
          x-enum:
            routing:
              x-field-uid: 1
        next_header:
          x-field-pattern:
            description: The next header that identifies the type of header immediately
              following this IPv6 Extension header. For TCP and UDP the values are 6 and 17 respectively.
              A value of 59 indicates that there are no further IPv6 Extension headers and that the
              payload will be appended after this header. The available defined values are listed in
              https://www.iana.org/assignments/ipv6-parameters/ipv6-parameters.xhtml#extension-header
            format: integer
            length: 8
            default: 59
            x-constants:
              tcp: 6
              udp: 17
              ipv6: 41
              ipv6_route: 43
              ipv6_frag: 44
              esp: 50
              ah: 51
              ipv6_icmp: 58
              ipv6_nonxt: 59
              ipv6_opts: 60
              mobility_header: 135
              sctp: 132
            features: [auto, count]
          x-field-uid: 2
        hdr_ext_len:
          x-field-pattern:
            description: The length of the IPv6 Extension header in 8 octet units, not including the first 8 octets
              of the Extension Header itself ( refer RFC 8200 ). When auto is assigned the implementation should
              automatically set it to the correct value.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 3
        routing:
          $ref: '#/components/schemas/Flow.Ipv6Routing'
          x-field-uid: 4
    Flow.Ipv6Routing:
      description: IPv6 routing packet headers.
      type: object
      properties:
        choice:
          type: string
          default: segment_routing
          x-field-uid: 1
          x-enum:
            segment_routing:
              x-field-uid: 1
            segment_routing_usid:
              x-field-uid: 2
        segment_routing:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting'
          x-field-uid: 2
        segment_routing_usid:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid'
          x-field-uid: 3
    Flow.Ipv6SegmentRouting:
      description: >-
        IPv6 Segment Routing Header (SRH, Routing Type 4, RFC 8754 Section 2)
        carrying full 128-bit SRv6 SIDs. Each segment list entry is a complete
        SID (locator + function + argument) as a 128-bit IPv6 address.
        Segment list encoded in reverse path order: Segment[0] is the last hop,
        Segment[n-1] is the first hop (active, placed in outer IPv6 dst).
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: >-
              Number of route segments remaining before the packet reaches its
              final destination (RFC 8754 Section 2.1). Decremented at each
              segment endpoint. When auto is assigned the value is set to the
              number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: >-
              Zero-based index of the last element in the Segment List
              (RFC 8754 Section 2.1). For example, a list of 3 SIDs has
              Last Entry = 2. When auto is assigned the value is set to
              one less than the number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Flags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: >-
              16-bit field used to tag a packet as part of a class or group
              (RFC 8754 Section 2.1). If not used it MUST be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: >-
            List of 128-bit SRv6 SID addresses (RFC 8754 Section 2.1), encoded
            in reverse path order: Segment[0] is the last segment of the SR
            Policy, Segment[n-1] is the first segment to visit.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Segment'
          x-field-uid: 5
        pad_tlv:
          description: >-
            When present, includes a Padding TLV (type 4, RFC 8754 Section 2.1)
            in the SRH TLV section to align the TLV block to an 8-byte boundary.
            Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.PadTlv'
          x-field-uid: 6
    
    Flow.Ipv6SegmentRouting.Segment:
      description: >-
        One entry in the SRH Segment List (RFC 8754 Section 2.1).
        A single 128-bit SRv6 SID address for full-SID encoding
        (locator + function + argument packed into one IPv6 address).
      type: object
      properties:
        segment:
          x-field-pattern:
            description: >-
              A 128-bit IPv6 SID address (RFC 8754 Section 2.1).
              Example: "2001:db8::1".
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 1

    Flow.Ipv6SegmentRoutingUsid:
      description: |-
        IPv6 Segment Routing Header (SRH, Routing Type 4, RFC 8754 Section 2)
        whose segment list carries compressed uSID containers (RFC 9800 Section 4).
        Each entry in segment_list represents one 128-bit compressed uSID container.
        The user supplies a structured locator prefix and a list of uSID values;
        the implementation assembles the 128-bit wire value by packing them as:
        LB (Locator Block bits) || uSID-1 || uSID-2 || ... || EoC (zeros).

        For F3216 format (RFC 9800 Section 3): LB = 32 bits, each uSID = 16 bits,
        maximum 6 uSIDs per container.
        Example - locator fc00::/32 with uSIDs 0x0001, 0x0002 assembles to
        container fc00:0:1:2:: placed in the SRH segment list entry.

        The segment list is encoded in reverse path order per RFC 8754 Section 2.1:
        segment[0] is the last container to visit, segment[n-1] is the first
        (active) container, whose value is also placed in the outer ipv6.dst_usids field. 
        The active container is determined by the segments_left pointer, 
        which is decremented as the packet progresses through the path and containers are exhausted,
        where n is the number of compressed uSID containers.

        Use this schema when the SR path requires more containers than fit in
        the outer ipv6.dst_usids alone. 
        For single-container paths with no SRH, set the locator and uSID list in ipv6.dst_usids from which 
        destination IPv6 address will be generated by the implementation.
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: >-
              Number of SRH segment list entries remaining to be visited after
              the current active compressed uSID container (RFC 8754 Section 2.1). 
              The active compressed uSID container is segment[segments_left]; 
              the value is decremented each time the active container is exhausted 
              and the pointer advances to the next compressed uSID container. 
              When auto is assigned the value is set to the top entry of the compressed uSID container list.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: >-
              Zero-based index of the last element in the uSID container list
              (RFC 8754 Section 2.1). When auto is assigned the value is set to
              one less than the number of containers specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.uSidFlags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: >-
              16-bit field used to tag a packet as part of a class or group
              (RFC 8754 Section 2.1). If not used it MUST be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: >-
            List of pre-computed 128-bit compressed uSID container values (RFC 9800 Section 4),
            encoded in reverse path order: Segment[0] is the last container,
            Segment[n-1] is the first container to visit.
            If Reduced SRH is needed ( RFC 8754 Section 4.1.1), the first compressed uSID container 
            is the one already in the ipv6.dst_usids and not included in this list.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid.Segment'
          x-field-uid: 5
        pad_tlv:
          description: >-
            When present, includes a Padding TLV (type 4, RFC 8754 Section 2.1)
            in the SRH TLV section to align the TLV block to an 8-byte boundary.
            Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.PadTlv'
          x-field-uid: 6

    Flow.Ipv6SegmentRoutingUsid.Segment:
      description: |-
        One compressed uSID container entry in the SRH segment list (RFC 9800 Section 4,
        RFC 8754 Section 2.1). The implementation assembles the 128-bit wire
        value by packing the locator block followed by the uSID values in order,
        zero-padding the remainder to 128 bits (End-of-Container marker).

        For F3216 format (RFC 9800 Section 3): Locator Block = 32 bits, each uSID = 16 bits,
        up to 6 uSIDs per container.
        Example - locator fc00::/32 (locator_length 32), usids ["0001","0002","0003"]
        assembles to the 128-bit SRH entry fc00:0:1:2:3::
      type: object
      properties:
        locator:
          x-field-pattern:
            description: >-
              The Locator Block (LB) IPv6 prefix shared by all uSIDs in this
              container (RFC 9800 Section 3). Defines the common high-order bits
              of every uSID assembled from this entry. For F3216, this is a /32
              prefix (e.g., fc00::). The prefix length is given by locator_length.
            format: ipv6
            default: ::0
            features: [count]
          x-field-uid: 1
        locator_length:
          x-field-pattern:
            description: >-
              Length of the Locator Block in bits (RFC 9800 Section 3).
              Determines how many high-order bits of locator are used as the LB
              and how many bits remain for uSID packing.
              For F3216: 32. For F3208: 32. Valid range: 1-112.
            format: integer
            length: 8
            default: 32
            features: [count]
          x-field-uid: 2
        usids:
          description: >-
            Ordered list of uSID values to pack into this container after the
            Locator Block (RFC 9800 Section 3). Each uSID occupies
            ((128 - locator_length) / no of uSIDs) bits. For F3216 each uSID is
            16 bits (4 hex chars) and up to 6 uSIDs fit per container.
            The implementation appends the End-of-Container zero-pad automatically.
            Example for F3216: ["0001","0002","0003"] with locator fc00::/32
            assembles to SRH entry fc00:0:1:2:3::
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid.uSid'
          x-field-uid: 3
        
    Flow.Ipv6SegmentRoutingUsid.uSid:
      description: >-
        One uSID value within a compressed uSID container (RFC 9800 Section 3). Represents
        a single network function (node SID, adjacency SID, or service SID)
        packed consecutively after the Locator Block inside the 128-bit container.
        For F3216 (RFC 9800 Section 3), each uSID is 16 bits (4 hex characters).
      type: object
      properties:
        usid:
          description: >-
            The uSID value expressed as a hex string (RFC 9800 Section 3).
            The string width must match the uSID bit length divided by 4.
            For F3216 (16-bit uSID): 4 hex characters.
            The value 0x0000 is reserved as the End-of-Container (EoC) marker
            and must not be used as a uSID value (RFC 9800 Section 3).
            Example: "0001" identifies node 1; with locator fc00::/32 this
            contributes the 0001 field to produce container fc00:0:1:...::
          type: string
          format: hex
          x-field-uid: 1

    Flow.Ipv6SegmentRouting.uSidFlags:
      description: >-
        SRH Flags field (RFC 8754 Section 2.1). An 8-bit field; RFC 8754
        marks all bits as reserved.
      type: object
      properties:
        oam:
          x-field-pattern:
            description: (RFC 9259, section 2) OAM flag or O-flag is set at bit-2. Indicates if the packet is an Operations, Administration,
              and Maintenance (OAM) packet.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_oam: 0
              oam: 1
            features:
              - count
          x-field-uid: 1
    
    Flow.Ipv6SegmentRouting.Flags:
      description: An 8-bit field containing flags. While RFC 8754 reserves all
        bits as unused, earlier drafts defined specific flags for behavior such
        as OAM, HMAC, and FRR protection.
      type: object
      properties:
        protected:
          x-field-pattern:
            description: Protected Flag. Indicates if the segment is protected
              by a Fast Re-Route (FRR) mechanism.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_protected: 0
              protected: 1
            features:
              - count
          x-field-uid: 1
        oam:
          x-field-pattern:
            description: (RFC 9259, section 2) OAM flag or O-flag is set at bit-2. Indicates if the packet is an Operations, Administration,
              and Maintenance (OAM) packet.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_oam: 0
              oam: 1
            features:
              - count
          x-field-uid: 2
        alert:
          x-field-pattern:
            description: Alert Flag. Indicates the presence of important TLVs
              that must be inspected.
            format: integer
            length: 1
            default: 0
            x-constants:
              no_alert: 0
              alert: 1
            features:
              - count
          x-field-uid: 3

    Flow.Ipv6SRH.PadTlv:
      description: >-
        SRH Padding TLV (type 4, RFC 8754 Section 2.1). Used to align the
        SRH TLV block to an 8-byte boundary. The padding bytes are set to zero
        and are skipped by transit nodes. When present this TLV is included in
        the SRH TLV section; omit the object to suppress it.
        Reference: RFC 8754 Section 2.1.
      type: object
      properties:
        type:
          x-field-pattern:
            description: >-
              TLV type code (RFC 8754 Section 2.1). The canonical value is 4.
              Set to a different value only for negative or conformance testing.
            format: integer
            length: 8
            default: 4
            features: [auto, count]
          x-field-uid: 1
        length:
          x-field-pattern:
            description: >-
              Number of padding bytes following the Type and Length fields
              (RFC 8754 Section 2.1). When auto is assigned the implementation
              computes the value needed to align the TLV section to an
              8-byte boundary.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
      