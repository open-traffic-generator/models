openapi: 3.0.3
info:
  title: Update protocol Config
  description: >-
    Update protocol Config for all control protocol schemas
  version: ^0.0.0
components:
  schemas:
    UpdateProtocol.Config.Isis:
      description: >-
        A container of IS-IS with associated properties to be updated that may or may not
        able to maintain the current IS-IS Up session state always.
      type: object
      properties:
        links:
          description: |-
            The flows that will be added to existing configuration on the traffic generator.
            The flow name must not already be used in existing configuration.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Link'
          x-field-uid: 1

    UpdateProtocol.Config.Isis.Link:
      description: >-
        A container of IS-IS with associated properties to be updated that may or may not
        able to maintain the current IS-IS Up session state always.
      type: object
      properties:
        interface_name:
          description: >-
            The name of an IS-IS emulated or simulated interface.
          type: string
          x-constraint:
          - "/components/schemas/Isis.Interface/properties/name"
          x-field-uid: 1
        metric:
          description: >-
            The default metric cost for the interface.
          type: integer
          format: uint32
          maximum: 16777215
          default: 10
          x-field-uid: 2
   