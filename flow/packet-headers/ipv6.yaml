components:
  schemas:
    Flow.Ipv6:
      description: IPv6 packet header
      type: object
      properties:
        version:
          x-field-pattern:
            description: >-
              Version number
            format: integer
            length: 4
            default: 6
            features: [count, metric_tags]
          x-field-uid: 1
        traffic_class:
          x-field-pattern:
            description: >-
              Traffic class
            format: integer
            length: 8
            default: 0
            features: [count, metric_tags]
          x-field-uid: 2
        flow_label:
          x-field-pattern:
            description: >-
              Flow label
            format: integer
            length: 20
            default: 0
            features: [count, metric_tags, random]
          x-field-uid: 3
        payload_length:
          x-field-pattern:
            description: >-
              Payload length
            format: integer
            length: 16
            default: 0
            features: [auto, count, metric_tags]
          x-field-uid: 4
        next_header:
          x-field-pattern:
            x-constants:
              hopopt: 0
              icmp: 1
              igmp: 2
              ggp: 3
              ip_in_ip: 4
              st: 5
              tcp: 6
              cpt: 7
              egp: 8
              igp: 9
              no_next_header: 59
            description: >-
              Next header
            format: integer
            length: 8
            default: 59
            features: [auto, count, metric_tags]
          x-field-uid: 5
        hop_limit:
          x-field-pattern:
            description: >-
              Hop limit
            format: integer
            length: 8
            default: 64
            features: [count, metric_tags]
          x-field-uid: 6
        src:
          x-field-pattern:
            description: >-
              Source address
            format: ipv6
            default: ::0
            features: [count, metric_tags, auto]
            auto:
              $ref: '#/components/schemas/Flow.Ipv6.Auto'
              default: false
          x-field-uid: 7
        dst:
          x-field-pattern:
            description: |-
              Destination address of the IPv6 packet.

              For SRv6 uSID traffic with no Segment Routing Header (reduced
              encapsulation, RFC 9800 Section 4), set this field to the uSID
              container that encodes the entire SR path. A uSID container is a
              128-bit IPv6 address that packs a sequence of Micro-SIDs
              consecutively after a common Locator Block (LB), with 0x0000
              (End-of-Container marker) padding unused slots to fill 128 bits.

              For the F3216 format (LB = 32 bits, uSID = 16 bits, RFC 9800
              Section 3), up to 6 uSIDs fit in one container. The bit layout is:
              [32-bit LB][uSID-1 16-bit][uSID-2 16-bit]...[uSID-N 16-bit][zeros].

              Example - path through 3 nodes, LB fc00::/32,
              uSIDs 0x0001 (node 1), 0x0002 (node 2), 0x0003 (node 3):
              dst = fc00:0:1:2:3::
              where fc00:0 is the 32-bit LB, 0001/0002/0003 are the per-node
              uSIDs, and :: represents the zero-padded End-of-Container tail.

              Each uN node on the path shifts out its own uSID and forwards to
              the next, updating the IPv6 DA in place (RFC 9800 Section 9.4):
              after node 1 - fc00:0:2:3::
              after node 2 - fc00:0:3::
              after node 3 - fc00:: (all uSIDs consumed, packet delivered).

              No SRH is needed when all path hops fit within a single 128-bit
              container. For paths requiring more than 6 hops (F3216), use
              Flow.Ipv6Routing with segment_routing_usid and carry additional
              containers in the SRH segment list.

              Reference: RFC 9800 Section 3 (F3216 format),
              RFC 9800 Section 9.4 (uN endpoint behavior).
            format: ipv6
            default: ::0
            features: [count, metric_tags, auto]
            auto:
              $ref: '#/components/schemas/Flow.Ipv6.Auto'
              default: false
          x-field-uid: 8
    Flow.Ipv6.Auto:
      description: |-
        The OTG implementation can provide a system generated, value for this property.
      type: object
      required: [choice]
      properties:
        choice:
          description: |- 
            The method to be used to provide the system generated value.
            The dhcp option populates the field based on the dynamic IPv6 address that has been assigned to the DHCPv6 client 
            by a DHCPv6 server.
          type: string
          x-enum:
            dhcp:
              x-field-uid: 1
          x-field-uid: 1
