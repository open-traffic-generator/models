components:
  schemas:
    Lag.Port.Macsec:
      description: >-
        Configuration of MACsec per LAG member port. This MACsec configuration per LAG member port and MACsec configuration in any Ethernet device a) on this port or b) on this LAG are mutually exclusive.
      type: object
      required: [secure_entity]
      properties:
        secure_entity:
          description: >-
            This contains the properties of Secure Entity (SecY) per LAG member port.
          $ref: '#/components/schemas/Lag.Port.Macsec.SecureEntity'
          x-field-uid: 1
        exclude_protocols:
          description: >-
            Protocols excluded from MACsec encapsulation at Tx from the LAG member port.
          $ref: '#/components/schemas/Lag.Port.Macsec.ExcludeProtocols'
          x-field-uid: 2
    Lag.Port.Macsec.ExcludeProtocols:
      description: >-
        Protocols excluded from MACsec encapsulation at Tx from the LAG member port.
      type: object
      properties:
        choice:
          description: >-
            Choose none to exclude no protocols i.e. all protocols are MACsec encapsulated at Tx. Choose per_protocol to opt per protocol.
          type: string
          default: none
          x-field-uid: 1
          x-enum:
            none:
              x-field-uid: 1
            per_protocol:
              x-field-uid: 2
        per_protocol:
          $ref: '#/components/schemas/Lag.Port.Macsec.ExcludeProtocols.PerProtocol'
          x-field-uid: 2
    Lag.Port.Macsec.ExcludeProtocols.PerProtocol:
      description: >-
        Per protocol choice to exclude from MACsec encapsulation at Tx from this LAG member port.
      type: object
      properties:
        lacp:
          description: |-
            Determines whether LACP should be excluded from MACsec encapsulation or not.
          type: boolean
          default: false
          x-field-uid: 1
    Lag.Port.Macsec.SecureEntity:
      description: >-
        Configuration of Secure Entity (SecY) per LAG member port.
      type: object
      required: [name, key_generation_protocol]
      properties:
        name:
          x-include: ../../common/common.yaml#/components/schemas/Named.Object/properties/name
          x-field-uid: 1
        key_generation_protocol:
          description: >-
            This contains the properties of key generation protocol of Secure Entity (SecY).
          $ref: '../../device/macsec/macsec.yaml#/components/schemas/SecureEntity.KeyGenerationProtocol'
          x-field-uid: 2
        data_plane:
          description: >-
            This contains the properties of data plane of Secure Entity (SecY).
          $ref: './dataplane/dataplane.yaml#/components/schemas/Lag.Port.Macsec.SecureEntity.DataPlane'
          x-field-uid: 3
