openapi: 3.0.3
info:
  title: Control protocol models
  description: >-
    All control protocol schemas
  version: ^0.0.0
components:
  schemas:
    State.Protocol.All:
      description: >-
        Sets all configured protocols to `start` or `stop` state.
        
        Setting protocol state to `start` shall be a no-op if preceding `set_config` API call
        was made with `config.options.protocol_options.auto_start_all` set to `true` or if
        all the configured protocols are already started.
      type: object
      required:
        - state
      properties:
        state:
          description: >-
            Protocol states
          type: string
          x-field-uid: 1
          x-enum:
            start:
              x-field-uid: 1
            stop:
              x-field-uid: 2
    State.Protocol.Route:
      description: >-
        Sets the state of configured routes
      type: object
      required:
        - state
      properties:
        names:
          description: >-
            The names of device route objects to control.
            If no names are specified then all route objects that match the
            x-constraint will be affected.
          type: array
          items:
            type: string
          x-constraint:
          - '/components/schemas/Bgp.V4RouteRange/properties/name'
          - '/components/schemas/Bgp.V6RouteRange/properties/name'
          - '/components/schemas/Isis.V4RouteRange/properties/name'
          - '/components/schemas/Isis.V6RouteRange/properties/name'
          - '/components/schemas/Ospfv2.V4RouteRange/properties/name'
          - '/components/schemas/Ospfv3.V6RouteRange/properties/name'
          x-field-uid: 1
        state:
          description: >-
            Route states
          type: string
          x-field-uid: 2
          x-enum:
            withdraw:
              x-field-uid: 1
            advertise:
              x-field-uid: 2
    State.Protocol.Lacp:
      description: >-
        Sets state of configured LACP
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            admin:
              x-field-uid: 1
            member_ports:
              x-field-uid: 2
          x-field-uid: 1
        admin:
          $ref: '#/components/schemas/State.Protocol.Lacp.Admin'
          x-field-uid: 2
        member_ports:
          $ref: '#/components/schemas/State.Protocol.Lacp.MemberPorts'
          x-field-uid: 3
    State.Protocol.Lacp.Admin:
      description: >-
        Sets admin state of LACP configured on LAG members
      required:
        - state
      properties:
        lag_member_names:
          description: >-
            The names of LAG members (ports) for which the state has to be applied.
            An empty or null list will control all LAG members.
          type: array
          items:
            type: string
          x-constraint:
          - '/components/schemas/Port/properties/name'
          x-field-uid: 1
        state:
          description: >-
            The LACP Member admin state.
            'up' will send LACPDUs with 'sync' flag set on selected member ports.
            'down' will send LACPDUs with 'sync' flag unset on selected member ports.
          type: string
          x-field-uid: 2
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
    State.Protocol.Lacp.MemberPorts:
      description: >-
        Sets state of LACP member ports configured on LAG.
      required:
        - state
      properties:
        lag_member_names:
          description: >-
            The names of LAG members (ports) for which the state has to be applied.
            An empty or null list will control all LAG members.
          type: array
          items:
            type: string
          x-constraint:
          - '/components/schemas/Port/properties/name'
          x-field-uid: 1
        state:
          description: >-
            The desired LACP member port state.
          type: string
          x-field-uid: 2
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
    State.Protocol.Bgp:
      description: >-
        Sets state of configured BGP peers.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            peers:
              x-field-uid: 1
          x-field-uid: 1
        peers:
          $ref: '#/components/schemas/State.Protocol.Bgp.Peers'
          x-field-uid: 2
    State.Protocol.Bgp.Peers:
      description: >-
        Sets state of configured BGP peers.
      required:
        - state
      properties:
        peer_names:
          description: >-
            The names of BGP peers for which the state has to be applied.
            An empty or null list will control all BGP peers.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Bgp.V4Peer/properties/name"
          - "/components/schemas/Bgp.V6Peer/properties/name"
          x-field-uid: 1
        state:
          description: >-
            The desired state of BGP peer.
            If the desired state is 'up', underlying IP interface(s) would be brought up automatically (if not already up), would attempt to bring up the BGP session(s) and advertise route(s), if configured.
            If the desired state is 'down', BGP session(s) would be brought down. 
          type: string
          x-field-uid: 2
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
    State.Protocol.Isis:
      description: >-
        Sets state of configured ISIS routers and Links.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            routers:
              x-field-uid: 1
            simulated_links:
              x-field-uid: 2
          x-field-uid: 1
        routers:
          $ref: '#/components/schemas/State.Protocol.Isis.Routers'
          x-field-uid: 2
        simulated_links:
          $ref: '#/components/schemas/State.Protocol.Isis.SimLinks'
          x-field-uid: 3
    State.Protocol.Isis.Routers:
      description: >-
        Sets state of configured ISIS routers.
      required:
        - state
      properties:
        router_names:
          description: >-
            The names of ISIS routers for which the state has to be applied.
            An empty or null list will control all ISIS routers.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Device.IsisRouter/properties/name"
          x-field-uid: 1
        state:
          description: >-
            The desired state of ISIS router.
            If the desired state is 'up', would attempt to bring up the ISIS session(s) with respective peer(s) and advertise route(s), if configured.
            If the desired state is 'down', would bring down ISIS session(s) with respective peer(s). 
          type: string
          x-field-uid: 2
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
    State.Protocol.Ospfv2:
      description: >-
        Sets state of configured OSPFv2 routers.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            routers:
              x-field-uid: 1
          x-field-uid: 1
        routers:
          $ref: '#/components/schemas/State.Protocol.Ospfv2.Routers'
          x-field-uid: 2
    State.Protocol.Ospfv2.Routers:
      description: >-
        Sets state of configured OSPFv2 routers.
      required:
        - state
      properties:
        router_names:
          description: >-
            The names of OSPFv2 routers for which the state has to be applied.
            An empty or null list will control all OSPFv2 routers.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Device.Ospfv2/properties/name"
          x-field-uid: 1
        state:
          description: >-
            The desired state of OSPFv2 router.
            If the desired state is 'up', would attempt to bring up the OSPFv2 session(s) with respective peer(s) and advertise route(s), if configured.
            If the desired state is 'down', would bring down OSPFv2 session(s) with respective peer(s). 
          type: string
          x-field-uid: 2
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
    State.Protocol.Ospfv3:
      description: >-
        Sets state of configured OSPFv3 routers.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            routers:
              x-field-uid: 1
          x-field-uid: 1
        routers:
          $ref: '#/components/schemas/State.Protocol.Ospfv3.Routers'
          x-field-uid: 2
    State.Protocol.Ospfv3.Routers:
      description: >-
        Sets state of configured OSPFv3 routers.
      required:
        - state
      properties:
        router_names:
          description: >-
            The names of OSPFv3 routers for which the state has to be applied.
            An empty or null list will control all OSPFv3 routers.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Ospfv3.RouterInstance/properties/name"
          x-field-uid: 1
        state:
          description: >-
            The desired state of OSPFv3 router.
            If the desired state is 'up', would attempt to bring up the OSPFv3 session(s) with respective peer(s) and advertise route(s), if configured.
            If the desired state is 'down', would bring down OSPFv3 session(s) with respective peer(s). 
          type: string
          x-field-uid: 2
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
    State.Protocol.Rocev2:
      description: >-
        Sets state of configured RoCEv2 peers.
      type: object
      required:
        - choice
      properties:
        choice:
          type: string
          x-enum:
            peers:
              x-field-uid: 1
          x-field-uid: 1
        peers:
          $ref: '#/components/schemas/State.Protocol.Rocev2.Peers'
          x-field-uid: 2
    State.Protocol.Rocev2.Peers:
      description: >-
        Sets state of configured RoCEv2 peers.
      required:
        - state
      properties:
        peer_names:
          description: >-
            The names of RoCEv2 peers for which the state has to be applied.
            An empty or null list will control all RoCEv2 peers.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Rocev2.V4Peer/properties/name"
          - "/components/schemas/Rocev2.V6Peer/properties/name"
          x-field-uid: 1
        state:
          description: >-
            The desired state of RoCEv2 peer.
            If the desired state is 'up', underlying IP interface(s) would be brought up automatically (if not already up),
             would attempt to bring up the RoCEv2 session(s).
            If the desired state is 'down', RoCEv2 session(s) would be brought down. 
          type: string
          x-field-uid: 2
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2

    State.Protocol.Isis.SimLinks:
      description: >-
        Sets the state of configured one or more Simulated Links (Interfaces)
      type: object
      properties:
        names:
          description: >-
            The names of ISIS Simulated Links to control.
            If no names are specified then all ISIS Simulated Links in the configuration will be affected..
          type: array
          items:
            type: string
          x-constraint:
          - '/components/schemas/Isis.Interface/properties/name'
          x-field-uid: 1
        state:
          description: |-
            description: |-
            Set ControlState to UP or DOWN to interface state in UP or DOWN state respectively in both directions. Thats is the UP/DOWN state is applied for a simulated link,
            connecting, say, a Node A to Node B and Node B to Node A in both directions.
            Setting Control State to DOWN will result in the selected set of Simulated Links to be set in disconnected state. This should result in the link to be removed from the 
            Extended IS Reachability TLV in subsequent LSP transmitted ( with incremented Sequence Number ) from both the Simulated or Emulated Router on which this link is 
            located as well the Simulated or Emulated Router at the other end of the link i.e. this will bring down the Simulated Links on both ends.
            Similarly, setting the Control State to UP should result in the neighbor information to be re-introduced in Extended IS Reachability sent in subsequent LSP Update by the 
            Router containing the Simulated Link and the neighboring Router at the other end of the link. Note that if the link is already in UP state and the Control State is set 
            to UP again or if the state is in DOWN state and the Control State is set to DOWN again, those links in the request should be ignored.
            
            Example:
            Suppose Emulated Router ER (680000000003) is connected to Simulated Routers:  ST1('770000000001'), ST2('770000000002') and ST3('770000000003') in a ring topology.
            ER <--> ST1 <--> ST2
            ^	            (A) ^
            |		              |
            v 	          (B) v
            -------ST3-------

            Before the AB Link Down operation between ST2 & ST3  the neighbors of ST2 & ST3 will be seen as in ISIS Link State PDU (LSP) information in Get State
            LSP-ID of ST2: 770000000002-00-00: IS-Reachability Neighbors : ['770000000001', '770000000003']
            LSP-ID of ST3: 770000000003-00-00: IS-Reachability Neighbors : ['770000000002', '770000000001']

            After the AB Link Down operation between ST2 & ST3  the neighbors of ST2 & ST3 will be seen as in ISIS Link State PDU (LSP) information in Get State
            LSP-ID of ST2: 770000000002-00-00: IS-Reachability Neighbors : ['770000000001']
            LSP-ID of ST3: 770000000003-00-00: IS-Reachability Neighbors : ['770000000001']
          type: string
          x-field-uid: 2
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2