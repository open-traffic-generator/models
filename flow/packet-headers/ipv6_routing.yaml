components:
  schemas:
    Flow.Ipv6ExtHeader:
      description: IPv6 Extension header should be preceded either by IPv6 header or other
        IPv6 Extension headers and the next_header in that preceding header should be set
        to the correct value depending on the type of extension header configured. This will
        be automatically handled by implementation if next_header choice is set to auto.
        For Routing Extension header this value is 43.
      type: object
      properties:
        choice:
          type: string
          default: routing
          x-field-uid: 1
          x-enum:
            routing:
              x-field-uid: 1
        next_header:
          x-field-pattern:
            description: The next header that identifies the type of header immediately
              following this IPv6 Extension header. For TCP and UDP the values are 6 and 17 respectively.
              A value of 59 indicates that there are no further IPv6 Extension headers and that the
              payload will be appended after this header. The available defined values are listed in
              https://www.iana.org/assignments/ipv6-parameters/ipv6-parameters.xhtml#extension-header
            format: integer
            length: 8
            default: 59
            x-constants:
              tcp: 6
              udp: 17
              ipv6: 41
              ipv6_route: 43
              ipv6_frag: 44
              esp: 50
              ah: 51
              ipv6_icmp: 58
              ipv6_nonxt: 59
              ipv6_opts: 60
              mobility_header: 135
              sctp: 132
            features: [auto, count]
          x-field-uid: 2
        hdr_ext_len:
          x-field-pattern:
            description: The length of the IPv6 Extension header in 8 octet units, not including the first 8 octets
              of the Extension Header itself ( refer RFC 8200 ). When auto is assigned the implementation should
              automatically set it to the correct value.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 3
        routing:
          $ref: '#/components/schemas/Flow.Ipv6Routing'
          x-field-uid: 4
    Flow.Ipv6Routing:
      description: IPv6 routing packet headers.
      type: object
      properties:
        choice:
          type: string
          default: segment_routing
          x-field-uid: 1
          x-enum:
            segment_routing:
              x-field-uid: 1
            segment_routing_usid:
              x-field-uid: 2
        segment_routing:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting'
          x-field-uid: 2
        segment_routing_usid:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid'
          x-field-uid: 3
    Flow.Ipv6SegmentRouting:
      description: >-
        IPv6 Segment Routing Header (SRH, Routing Type 4, RFC 8754 Section 2)
        carrying full 128-bit SRv6 SIDs. Each segment list entry is a complete
        SID (locator + function + argument) as a 128-bit IPv6 address.
        Segment list encoded in reverse path order: Segment[0] is the last hop,
        Segment[n-1] is the first hop (active, placed in outer IPv6 dst).
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: >-
              Number of route segments remaining before the packet reaches its
              final destination (RFC 8754 Section 2.1). Decremented at each
              segment endpoint. When auto is assigned the value is set to the
              number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: >-
              Zero-based index of the last element in the Segment List
              (RFC 8754 Section 2.1). For example, a list of 3 SIDs has
              Last Entry = 2. When auto is assigned the value is set to
              one less than the number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Flags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: >-
              16-bit field used to tag a packet as part of a class or group
              (RFC 8754 Section 2.1). If not used it MUST be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: >-
            List of 128-bit SRv6 SID addresses (RFC 8754 Section 2.1), encoded
            in reverse path order: Segment[0] is the last segment of the SR
            Policy, Segment[n-1] is the first segment to visit.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Segment'
          x-field-uid: 5
        ingress_node_tlv:
          description: >-
            When present, includes an Ingress Node TLV (type 1, RFC 9259 Section 3.1)
            in the SRH TLV section. Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.IngressNodeTlv'
          x-field-uid: 6
        egress_node_tlv:
          description: >-
            When present, includes an Egress Node TLV (type 2, RFC 9259 Section 3.2)
            in the SRH TLV section. Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.EgressNodeTlv'
          x-field-uid: 7
        opaque_tlv:
          description: >-
            When present, includes an Opaque Container TLV (type 3, RFC 8754 Section 2.1)
            in the SRH TLV section. Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.OpaqueContainerTlv'
          x-field-uid: 8
        pad_tlv:
          description: >-
            When present, includes a Padding TLV (type 4, RFC 8754 Section 2.1)
            in the SRH TLV section to align the TLV block to an 8-byte boundary.
            Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.PadTlv'
          x-field-uid: 9
        path_trace_tlv:
          description: >-
            When present, includes a Path Trace TLV (type 128,
            draft-ietf-spring-srv6-path-tracing) in the SRH TLV section.
            Each SRv6 endpoint on the path appends an 8-byte block containing
            node identity, timestamp, and performance monitoring data.
            Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.PathTraceTlv'
          x-field-uid: 10
    Flow.Ipv6SegmentRoutingUsid:
      description: >-
        IPv6 Segment Routing Header (SRH, Routing Type 4, RFC 8754 Section 2)
        carrying pre-computed uSID containers (RFC 9800 Section 4). Each segment
        list entry is a 128-bit uSID container value supplied as a plain IPv6
        address. The user pre-computes the container outside the schema; no
        decomposition fields appear on the wire.
        Segment list encoded in reverse path order: Segment[0] is the last
        container, Segment[n-1] is the first (active, placed in outer IPv6 dst).
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: >-
              Number of uSID containers remaining before the packet reaches its
              final destination (RFC 8754 Section 2.1). Decremented when the
              active container is exhausted and the next container becomes active.
              When auto is assigned the value is set to the number of containers
              specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: >-
              Zero-based index of the last element in the uSID container list
              (RFC 8754 Section 2.1). When auto is assigned the value is set to
              one less than the number of containers specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Flags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: >-
              16-bit field used to tag a packet as part of a class or group
              (RFC 8754 Section 2.1). If not used it MUST be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: >-
            List of pre-computed 128-bit uSID container values (RFC 9800 Section 4),
            encoded in reverse path order: Segment[0] is the last container,
            Segment[n-1] is the first container to visit.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid.Segment'
          x-field-uid: 5
        ingress_node_tlv:
          description: >-
            When present, includes an Ingress Node TLV (type 1, RFC 9259 Section 3.1)
            in the SRH TLV section. Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.IngressNodeTlv'
          x-field-uid: 6
        egress_node_tlv:
          description: >-
            When present, includes an Egress Node TLV (type 2, RFC 9259 Section 3.2)
            in the SRH TLV section. Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.EgressNodeTlv'
          x-field-uid: 7
        opaque_tlv:
          description: >-
            When present, includes an Opaque Container TLV (type 3, RFC 8754 Section 2.1)
            in the SRH TLV section. Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.OpaqueContainerTlv'
          x-field-uid: 8
        pad_tlv:
          description: >-
            When present, includes a Padding TLV (type 4, RFC 8754 Section 2.1)
            in the SRH TLV section to align the TLV block to an 8-byte boundary.
            Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.PadTlv'
          x-field-uid: 9
        path_trace_tlv:
          description: >-
            When present, includes a Path Trace TLV (type 128,
            draft-ietf-spring-srv6-path-tracing) in the SRH TLV section.
            Each SRv6 endpoint on the path appends an 8-byte block containing
            node identity, timestamp, and performance monitoring data.
            Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.PathTraceTlv'
          x-field-uid: 10
    Flow.Ipv6SegmentRouting.Segment:
      description: >-
        One entry in the SRH Segment List (RFC 8754 Section 2.1).
        A single 128-bit SRv6 SID address for full-SID encoding
        (locator + function + argument packed into one IPv6 address).
      type: object
      properties:
        segment:
          x-field-pattern:
            description: >-
              A 128-bit IPv6 SID address (RFC 8754 Section 2.1).
              Example: "2001:db8::1".
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 1
    Flow.Ipv6SegmentRoutingUsid.Segment:
      description: >-
        One pre-computed uSID container entry in the SRH Segment List
        (RFC 9800 Section 4, RFC 8754 Section 2.1). Supplied as a plain
        128-bit IPv6 address; no decomposition metadata is carried on the wire.
      type: object
      properties:
        segment:
          x-field-pattern:
            description: >-
              A pre-computed 128-bit uSID container value as an IPv6 address
              (RFC 9800 Section 4). Example: "fc00:0:2:1:3:1::".
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 1
    Flow.Ipv6SegmentRouting.Flags:
      description: >-
        SRH Flags field (RFC 8754 Section 2.1). An 8-bit field; RFC 8754
        marks all bits as reserved. IxNetwork exposes the following bits
        for OAM, HMAC, FRR, and protocol testing: Protected (FRR),
        Alert, O (OAM, RFC 9259), H (HMAC), and two reserved bits U1 and U2.
      type: object
      properties:
        protected:
          x-field-pattern:
            description: >-
              Protected (P) flag. Indicates that the segment is protected
              by a Fast Re-Route (FRR) mechanism (RFC 8754 Section 2.1).
            format: integer
            length: 1
            default: 0
            x-constants:
              not_protected: 0
              protected: 1
            features:
              - count
          x-field-uid: 1
        alert:
          x-field-pattern:
            description: >-
              Alert (A) flag. Indicates the presence of important TLVs in the
              SRH that must be examined by the receiving endpoint
              (RFC 8754 Section 2.1).
            format: integer
            length: 1
            default: 0
            x-constants:
              no_alert: 0
              alert: 1
            features:
              - count
          x-field-uid: 2
        o_flag:
          x-field-pattern:
            description: >-
              OAM (O) flag (RFC 9259 Section 2). When set, marks this packet
              as an active OAM probe. SRv6 endpoint nodes that process OAM
              packets inspect SRH TLVs such as the Ingress Node TLV (type 1)
              and Egress Node TLV (type 2) to perform path verification.
              Reference: RFC 8754 Section 2.1, RFC 9259 Section 2.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_oam: 0
              oam: 1
            features:
              - count
          x-field-uid: 3
        h_flag:
          x-field-pattern:
            description: >-
              HMAC (H) flag (RFC 8754 Section 2.1). When set, indicates that
              this SRH includes an HMAC TLV (type 5) providing data integrity
              and source authentication for the segment routing path.
              Reference: RFC 8754 Section 2.1.
            format: integer
            length: 1
            default: 0
            x-constants:
              no_hmac: 0
              hmac: 1
            features:
              - count
          x-field-uid: 4
        u1_flag:
          x-field-pattern:
            description: >-
              Reserved bit U1 (RFC 8754 Section 2.1). MUST be zero on normal
              transmission. Exposed for negative or conformance testing only.
            format: integer
            length: 1
            default: 0
            features:
              - count
          x-field-uid: 5
        u2_flag:
          x-field-pattern:
            description: >-
              Reserved bit U2 (RFC 8754 Section 2.1). MUST be zero on normal
              transmission. Exposed for negative or conformance testing only.
            format: integer
            length: 1
            default: 0
            features:
              - count
          x-field-uid: 6
    Flow.Ipv6SRH.IngressNodeTlv:
      description: >-
        SRH Ingress Node TLV (type 1, RFC 9259 Section 3.1). Identifies the
        global IPv6 address of the SRv6 ingress node that imposed the SRH on
        the packet. OAM-capable endpoint nodes (those that process packets with
        the O-flag set) inspect this TLV to verify that the packet entered the
        SR domain at the expected node. When present this TLV is included in the
        SRH TLV section; omit the object to suppress it.
        Reference: RFC 9259 Section 3.1.
      type: object
      properties:
        type:
          x-field-pattern:
            description: >-
              TLV type code (RFC 9259 Section 3.1). The canonical value is 1.
              Set to a different value only for negative or conformance testing.
            format: integer
            length: 8
            default: 1
            features: [auto, count]
          x-field-uid: 1
        length:
          x-field-pattern:
            description: >-
              Length of the TLV Value field in bytes (RFC 9259 Section 3.1).
              When auto is assigned the implementation sets this to 18:
              1-byte Reserved + 1-byte Node ID Len (fixed at 16) +
              16-byte IPv6 address.
            format: integer
            length: 8
            default: 18
            features: [auto, count]
          x-field-uid: 2
        reserved:
          x-field-pattern:
            description: >-
              Reserved byte following the Length field (RFC 9259 Section 3.1).
              Must be zero on transmission. The adjacent Node ID Length byte
              is fixed at 16 for IPv6 addresses and is not separately configurable.
            format: integer
            length: 8
            default: 0
            features:
              - count
          x-field-uid: 3
        value:
          x-field-pattern:
            description: >-
              Global IPv6 address of the SRv6 ingress node (RFC 9259 Section 3.1).
              This is the address of the node that imposed the SRH on the packet.
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 4
    Flow.Ipv6SRH.EgressNodeTlv:
      description: >-
        SRH Egress Node TLV (type 2, RFC 9259 Section 3.2). Identifies the
        global IPv6 address of the intended SRv6 egress node - the last segment
        endpoint of the SR policy. OAM-capable endpoint nodes inspect this TLV
        to verify that the packet will exit the SR domain at the expected node.
        When present this TLV is included in the SRH TLV section; omit the
        object to suppress it.
        Reference: RFC 9259 Section 3.2.
      type: object
      properties:
        type:
          x-field-pattern:
            description: >-
              TLV type code (RFC 9259 Section 3.2). The canonical value is 2.
              Set to a different value only for negative or conformance testing.
            format: integer
            length: 8
            default: 2
            features: [auto, count]
          x-field-uid: 1
        length:
          x-field-pattern:
            description: >-
              Length of the TLV Value field in bytes (RFC 9259 Section 3.2).
              When auto is assigned the implementation sets this to 18:
              1-byte Reserved + 1-byte Node ID Len (fixed at 16) +
              16-byte IPv6 address.
            format: integer
            length: 8
            default: 18
            features: [auto, count]
          x-field-uid: 2
        reserved:
          x-field-pattern:
            description: >-
              Reserved byte following the Length field (RFC 9259 Section 3.2).
              Must be zero on transmission. The adjacent Node ID Length byte
              is fixed at 16 for IPv6 addresses and is not separately configurable.
            format: integer
            length: 8
            default: 0
            features:
              - count
          x-field-uid: 3
        value:
          x-field-pattern:
            description: >-
              Global IPv6 address of the intended SRv6 egress node
              (RFC 9259 Section 3.2). This is the address of the final segment
              endpoint of the SR policy.
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 4
    Flow.Ipv6SRH.OpaqueContainerTlv:
      description: >-
        SRH Opaque Container TLV (type 3, RFC 8754 Section 2.1). Carries
        implementation-specific or application-defined opaque data in the
        SRH TLV section. Transit nodes do not interpret the contents.
        When present this TLV is included in the SRH TLV section; omit the
        object to suppress it.
        Reference: RFC 8754 Section 2.1.
      type: object
      properties:
        type:
          x-field-pattern:
            description: >-
              TLV type code (RFC 8754 Section 2.1). The canonical value is 3.
              Set to a different value only for negative or conformance testing.
            format: integer
            length: 8
            default: 3
            features: [auto, count]
          x-field-uid: 1
        length:
          x-field-pattern:
            description: >-
              Length of the TLV Value field in bytes (RFC 8754 Section 2.1).
              When auto is assigned the implementation derives this from the
              length of the value string.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        value:
          description: >-
            Opaque data as a hex string (RFC 8754 Section 2.1). The content
            is implementation-defined and not interpreted by transit nodes.
            Example: "deadbeef01020304".
          type: string
          format: hex
          x-field-uid: 3
    Flow.Ipv6SRH.PadTlv:
      description: >-
        SRH Padding TLV (type 4, RFC 8754 Section 2.1). Used to align the
        SRH TLV block to an 8-byte boundary. The padding bytes are set to zero
        and are skipped by transit nodes. When present this TLV is included in
        the SRH TLV section; omit the object to suppress it.
        Reference: RFC 8754 Section 2.1.
      type: object
      properties:
        type:
          x-field-pattern:
            description: >-
              TLV type code (RFC 8754 Section 2.1). The canonical value is 4.
              Set to a different value only for negative or conformance testing.
            format: integer
            length: 8
            default: 4
            features: [auto, count]
          x-field-uid: 1
        length:
          x-field-pattern:
            description: >-
              Number of padding bytes following the Type and Length fields
              (RFC 8754 Section 2.1). When auto is assigned the implementation
              computes the value needed to align the TLV section to an
              8-byte boundary.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
    Flow.Ipv6SRH.PathTraceTlv:
      description: >-
        SRH Path Trace TLV (type 128, draft-ietf-spring-srv6-path-tracing).
        Records path information as the packet traverses SRv6 segment endpoints.
        The ingress node initializes the TLV; each subsequent SRv6 endpoint
        appends an 8-byte block containing its node identity, timestamp, and
        performance monitoring data. When present this TLV is included in the
        SRH TLV section; omit the object to suppress it.
        Reference: draft-ietf-spring-srv6-path-tracing.
      type: object
      properties:
        type:
          x-field-pattern:
            description: >-
              TLV type code (draft-ietf-spring-srv6-path-tracing). The canonical
              value is 128. Set to a different value only for negative or
              conformance testing.
            format: integer
            length: 8
            default: 128
            features: [auto, count]
          x-field-uid: 1
        length:
          x-field-pattern:
            description: >-
              Length of the TLV Value field in bytes
              (draft-ietf-spring-srv6-path-tracing). When auto is assigned
              the implementation derives this from the configured value fields.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        reserved:
          x-field-pattern:
            description: >-
              Reserved field (draft-ietf-spring-srv6-path-tracing).
              Must be zero on transmission.
            format: integer
            length: 8
            default: 0
            features:
              - count
          x-field-uid: 3
        timestamp:
          x-field-pattern:
            description: >-
              Timestamp inserted by the ingress node
              (draft-ietf-spring-srv6-path-tracing). Encoded as a 32-bit
              truncated PTP timestamp value.
            format: integer
            length: 32
            default: 0
            features:
              - count
          x-field-uid: 4
        pm_data:
          x-field-pattern:
            description: >-
              Performance Monitoring (PM) data inserted by the ingress node
              (draft-ietf-spring-srv6-path-tracing). Carries interface and
              load information encoded as a 32-bit value.
            format: integer
            length: 32
            default: 0
            features:
              - count
          x-field-uid: 5
        value:
          x-field-pattern:
            description: >-
              Initial node identification value inserted by the ingress node
              (draft-ietf-spring-srv6-path-tracing). Identifies the ingress
              node within the path trace record.
            format: integer
            length: 32
            default: 0
            features:
              - count
          x-field-uid: 6
