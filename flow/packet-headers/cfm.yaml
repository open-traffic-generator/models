components:
  schemas:
    Flow.Cfm:
      description: Defines the fields of a Connectivity Fault Management (CFM)
        Packet Data Unit (PDU) as specified in IEEE 802.1Q-2018 Clause 12.
      type: object
      properties:
        md_level:
          description: >-
            Maintenance Domain Level
          type: integer
          format: uint32
          default: 0
          maximum: 7
          x-field-uid: 1
        version:
          description: >-
            Indicates the version as specified in IEEE 802.1Q-2018 §12.14.1.
          type: integer
          format: uint32
          default: 0
          maximum: 31
          x-field-uid: 2
        op_code:
          $ref: '#/components/schemas/Flow.Cfm.SelectOpCode'
          x-field-uid: 3
    Flow.Cfm.SelectOpCode:
      description: Select message header. The opcode byte in the CFM Common Header is
        automatically set based on the choice as defined in IEEE 802.1Q-2018 Table 21-7.
        Currently only Continuity Check Message (CCM), Loopback Message (LBM) and
        Loopback Reply (LBR) are supported.
      type: object
      properties:
        choice:
          type: string
          default: ccm
          x-field-uid: 1
          x-enum:
            ccm:
              x-field-uid: 1
            lbm:
              x-field-uid: 2
            lbr:
              x-field-uid: 3
        ccm:
          $ref: '#/components/schemas/Flow.Cfm.Ccm'
          x-field-uid: 2
        lbm:
          $ref: '#/components/schemas/Flow.Cfm.Lbm'
          x-field-uid: 3
        lbr:
          $ref: '#/components/schemas/Flow.Cfm.Lbr'
          x-field-uid: 4
    Flow.Cfm.Ccm:
      description: CCM is a multicast PDU used to detect continuity and configuration errors
        within a Maintenance Association (MA). As defined in IEEE 802.1Q-2018 §12.14.6.
      type: object
      properties:
        flags:
          $ref: '#/components/schemas/Flow.Cfm.Ccm.Flags'
          x-field-uid: 1
        sequence_number:
          x-field-pattern:
            description: >-
              CCM unique sequence number
            format: integer
            length: 32
            default: 0
            features: [count]
          x-field-uid: 2
        ma_endpoint_identifier:
          x-field-pattern:
            description: >-
              Maintenance association endpoint identifier
            format: integer
            length: 16
            default: 1
            minimum: 1
            maximum: 8191
            features: [count]
          x-field-uid: 3
        ethernet_oam_protocol:
          $ref: '#/components/schemas/Flow.Cfm.OamProtocol'
          x-field-uid: 4
        tlvs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Cfm.Tlvs'
          x-field-uid: 5
    Flow.Cfm.Ccm.Flags:
      description: CCM flags byte has RDI, Traffic/T (Y.1731 only), and CCM Interval.
      type: object
      properties:
        rdi:
          description: >-
            Remote Defect Indicator (RDI) bit is set to inform remote peers that it is
            experiencing a fault, such as a local interface failure.
          type: integer
          format: uint32
          default: 0
          maximum: 1
          x-field-uid: 1
        traffic:
          description: >-
            The Traffic bit (T) indicates whether the transmitting MEP has customer
            traffic flowing on the associated service instance. Set to 1 when the MEP
            is transmitting customer traffic, 0 otherwise. As defined in ITU-T Y.1731
            it must be set to 0 for IEEE 802.1Q-2018 CFM operation.
          type: integer
          format: uint32
          default: 0
          maximum: 1
          x-field-uid: 2
        ccm_interval:
          description: >-
            The CCM interval field is used to indicate how frequently "heartbeat" packets
            are sent between Maintenance End Points (MEPs) as defined in IEEE 802.1ag/ITU-T Y.1731.
            It is `000`=Invalid, `001`=3.33 ms, `010`=10 ms, `011`=100 ms, `100`=1 s,
            `101`=10 s, `110`=1 min, `111`=10 min
          type: integer
          format: uint32
          default: 0
          maximum: 7
          x-field-uid: 3
    Flow.Cfm.OamProtocol:
      description: >-
        Ethernet OAM standard used to encode the 48-byte identifier field in the CCM PDU.
        IEEE 802.1Q-2018 uses a MAID (MD Name + Short MA Name). ITU-T Y.1731 uses a
        MEG ID with a different fixed-format encoding.
      type: object
      properties:
        choice:
          type: string
          default: cfm
          x-field-uid: 1
          x-enum:
            cfm:
              x-field-uid: 1
            y1731:
              x-field-uid: 2
        cfm:
          $ref: '#/components/schemas/Flow.Cfm.MaidCfm'
          x-field-uid: 2
        y1731:
          $ref: '#/components/schemas/Flow.Cfm.Y1731'
          x-field-uid: 3
    Flow.Cfm.MaidCfm:
      description: Connectivity Fault Management
      type: object
      properties:
        md_name:
          $ref: '#/components/schemas/Flow.Cfm.MDName'
          x-field-uid: 1
        short_ma_name_format:
          description: >-
            Short MA name format values as defined in IEEE 802.1Q-2018 Table 21-20.
            Value 1: primary VID encoded as a 2-octet unsigned integer.
            Value 2: RFC 2579 DisplayString up to 45 octets.
            Value 3: 2-octet unsigned integer (e.g., a VLAN ID).
            Value 4: RFC 2685 VPN ID, 7 octets.
          type: string
          default: char_str
          x-enum:
            primary_vid:
              x-field-uid: 1
            char_str:
              x-field-uid: 2
            two_oct_int:
              x-field-uid: 3
            rfc_2685_vpn_id:
              x-field-uid: 4
          x-field-uid: 2
        short_ma_name_length:
          x-field-pattern:
            description: >-
              Short MA name length
            format: integer
            length: 8
            default: 1
            features: [auto, count]
          x-field-uid: 3
        short_ma_name:
          description: >-
            Short MA name
          type: string
          format: hex
          default: '00'
          x-field-uid: 4
    Flow.Cfm.Y1731:
      description: >-
        ITU-T Y.1731 MEG (Maintenance Entity Group) identifier used to encode the
        48-byte identifier field in the CCM PDU, as defined in ITU-T Y.1731 Table A.1.
      type: object
      properties:
        meg_id_format:
          description: >-
            MEG ID format as defined in ITU-T Y.1731 Table A.1.
            icc_based: ICC-based MEG ID format (13 octets: 6-octet ICC + 7-octet UMC).
            y1731_char_str: ITU-T Y.1731 character string format.
          type: string
          default: icc_based
          x-enum:
            icc_based:
              x-field-uid: 1
            y1731_char_str:
              x-field-uid: 2
          x-field-uid: 1
        meg_id_length:
          x-field-pattern:
            description: >-
              Length of the MEG ID value in octets. Maximum 13 octets for icc_based format
              (6-octet ICC + 7-octet UMC). Maximum 45 octets for y1731_char_str format.
            format: integer
            length: 8
            default: 13
            features: [auto, count]
          x-field-uid: 2
        meg_id:
          description: >-
            MEG ID value encoded as a hex string.
          type: string
          format: hex
          default: '00'
          x-field-uid: 3
    Flow.Cfm.MDName:
      description: >-
        Maintenance domain name. May be absent or specified. When absent, MD Name Format
        is set to 1 (no MD name) per IEEE 802.1Q-2018.
      type: object
      properties:
        choice:
          type: string
          default: no_maintenance_domain
          x-enum:
            no_maintenance_domain:
              x-field-uid: 1
            maintenance_domain_present:
              x-field-uid: 2
          x-field-uid: 1
        maintenance_domain_present:
          $ref: '#/components/schemas/Flow.Cfm.MDNamePresent'
          x-field-uid: 2
    Flow.Cfm.MDNamePresent:
      description: >-
        Maintenance domain name
      type: object
      properties:
        md_name_format:
          description: >-
            Maintenance domain name format
          type: string
          default: char_str
          x-enum:
            domain_name_str:
              x-field-uid: 1
            mac_addr:
              x-field-uid: 2
            char_str:
              x-field-uid: 3
          x-field-uid: 1
        md_name_length:
          x-field-pattern:
            description: >-
              Maintenance domain name length
            format: integer
            length: 8
            default: 1
            features: [auto, count]
          x-field-uid: 2
        md_name:
          description: >-
            Maintenance domain name
          type: string
          format: hex
          default: '00'
          x-field-uid: 3
    Flow.Cfm.Lbm:
      description: Loopback Message (LBM) is a diagnostic frame used to verify connectivity between
        Maintenance End Points (MEPs) and Maintenance Intermediate Points (MIPs).
        LBM flag bits are reserved and set to zero.
      type: object
      properties:
        transaction_id:
          x-field-pattern:
            description: >-
              Transaction id or sequence number to detect out-of-order packets.
            format: integer
            length: 32
            default: 0
            features: [count]
          x-field-uid: 1
        tlvs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Cfm.Tlvs'
          x-field-uid: 2
    Flow.Cfm.Lbr:
      description: Loopback Reply (LBR) messages are unicast frames sent by a Maintenance Association
        End Point (MEP) or Intermediate Point (MIP) to a source MEP in response to a Loopback Message (LBM).
        LBR flag bits are reserved and set to zero.
      type: object
      properties:
        transaction_id:
          x-field-pattern:
            description: >-
              Transaction id or sequence number copied from the LBM to match the reply to the specific request.
            format: integer
            length: 32
            default: 0
            features: [count]
          x-field-uid: 1
        tlvs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Cfm.Tlvs'
          x-field-uid: 2
    Flow.Cfm.Tlvs:
      description: The CFM TLV format is defined in 8021Q. Common fields are
        Type (1 octet) defined by choice below, Length (2 octet) and Value (variable)
        defined for each tlv type.
      type: object
      properties:
        choice:
          type: string
          default: end
          x-field-uid: 1
          x-enum:
            end:
              x-field-uid: 1
            sender_id:
              x-field-uid: 2
            port_status:
              x-field-uid: 3
            interface_status:
              x-field-uid: 4
            data:
              x-field-uid: 5
        length:
          x-field-pattern:
            description: Specifies the length of the tlv data in octets.
            format: integer
            length: 16
            default: 0
            features: [auto, count]
          x-field-uid: 2
        sender_id:
          $ref: '#/components/schemas/Flow.Cfm.SenderIdTlv'
          x-field-uid: 3
        port_status:
          $ref: '#/components/schemas/Flow.Cfm.PortStatusTlv'
          x-field-uid: 4
        interface_status:
          $ref: '#/components/schemas/Flow.Cfm.InterfaceStatusTlv'
          x-field-uid: 5
        data:
          $ref: '#/components/schemas/Flow.Cfm.DataTlv'
          x-field-uid: 6
    Flow.Cfm.SenderIdTlv:
      description: Sender ID TLV is used to help identify the sender's hardware and management address.
      type: object
      properties:
        choice:
          type: string
          default: no_chassis_id
          x-enum:
            no_chassis_id:
              x-field-uid: 1
            chassis_id_present:
              x-field-uid: 2
          x-field-uid: 1
        chassis_id_present:
          $ref: '#/components/schemas/Flow.Cfm.SenderIdTlv.ChassisId'
          x-field-uid: 2
    Flow.Cfm.SenderIdTlv.ChassisId:
      description: Sender ID TLV with chassis id
      type: object
      properties:
        choice:
          type: string
          default: no_management_address_domain
          x-enum:
            no_management_address_domain:
              x-field-uid: 1
            management_address_domain:
              x-field-uid: 2
          x-field-uid: 1
        chassis_id_subtype:
          description: Specifies the LLDP Chassis ID Subtype (IEEE 802.1AB-2016 Table 8-3).
          type: string
          default: mac_address
          x-enum:
            chassis_component:
              x-field-uid: 1
            interface_alias:
              x-field-uid: 2
            port_component:
              x-field-uid: 3
            mac_address:
              x-field-uid: 4
            network_address:
              x-field-uid: 5
            interface_name:
              x-field-uid: 6
            locally_assigned:
              x-field-uid: 7
          x-field-uid: 2
        chassis_id_length:
          x-field-pattern:
            description: Specifies the length of the chassis ID field.
            format: integer
            length: 8
            default: 1
            features: [auto, count]
          x-field-uid: 3
        chassis_id:
          description: >-
            Chassis ID
          type: string
          format: hex
          default: '00'
          x-field-uid: 4
        management_address_domain:
          $ref: '#/components/schemas/Flow.Cfm.SenderIdTlv.MADomain'
          x-field-uid: 5
    Flow.Cfm.SenderIdTlv.MADomain:
      description: Sender ID TLV with management address domain
      type: object
      properties:
        choice:
          type: string
          default: no_management_address
          x-enum:
            no_management_address:
              x-field-uid: 1
            management_address:
              x-field-uid: 2
          x-field-uid: 1
        management_address_domain_length:
          x-field-pattern:
            description: Specifies the length of the management address domain.
            format: integer
            length: 8
            default: 1
            features: [auto, count]
          x-field-uid: 2
        management_address_domain:
          description: >-
            Management address domain
          type: string
          format: hex
          default: '00'
          x-field-uid: 3
        management_address:
          $ref: '#/components/schemas/Flow.Cfm.SenderIdTlv.MgmtAddress'
          x-field-uid: 4
    Flow.Cfm.SenderIdTlv.MgmtAddress:
      description: Sender ID TLV with management address
      type: object
      properties:
        management_address_length:
          x-field-pattern:
            description: Specifies the length of the management address.
            format: integer
            length: 8
            default: 1
            features: [auto, count]
          x-field-uid: 1
        management_address:
          description: >-
            Management address
          type: string
          format: hex
          default: '00'
          x-field-uid: 2
    Flow.Cfm.PortStatusTlv:
      description: Port status TLV indicates the ability of the Bridge Port to pass ordinary data traffic,
        as defined in IEEE 802.1Q-2018 §12.14.3.3.
      type: object
      properties:
        status:
          description: Port status can be either port blocked or port up
          type: string
          default: port_up
          x-enum:
            port_blocked:
              x-field-uid: 1
            port_up:
              x-field-uid: 2
          x-field-uid: 1
    Flow.Cfm.InterfaceStatusTlv:
      description: Interface status TLV is used to propagate the operational state of a physical or logical
        interface between Provider Edge (PE) and Customer Edge (CE) devices.
      type: object
      properties:
        status:
          description: Defined interface status
          type: string
          default: up
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
            testing:
              x-field-uid: 3
            unknown:
              x-field-uid: 4
            dormant:
              x-field-uid: 5
            not_present:
              x-field-uid: 6
            lower_layer_down:
              x-field-uid: 7
          x-field-uid: 1
    Flow.Cfm.DataTlv:
      description: Data TLV (Type 3) used to carry arbitrary test data, typically for loopback testing.
        As defined in IEEE 802.1Q-2018 §12.14.3.2.
      type: object
      properties:
        data:
          description: String data for the tlv
          type: string
          format: hex
          default: '00'
          x-field-uid: 1