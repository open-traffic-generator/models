openapi: 3.0.3
info:
  title: Update IS-IS protocol Config
  description: >-
    Update IS-IS protocol Config for IS-IS control protocol schema.
  version: ^0.0.0
components:
  schemas:
    UpdateProtocol.Config.Isis:
      description: >-
        A container for IS-IS properties to be updated. Presence of this object
        indicates that one or more IS-IS properties require updating.
        Router-level and interface-level updates are controlled independently.
      type: object
      properties:
        routers:
          description: >-
            List of IS-IS router-level update groups. Populate this field to
            update router-level attributes independently of interface-level attributes.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Router.UpdateGroup'
          x-field-uid: 2
        interfaces:
          description: >-
            List of IS-IS interface update groups. IS-IS interface names are
            globally unique across all routers so no parent router name is required.
            Each update group applies attribute updates to one or more interfaces
            simultaneously. Use multiple update groups to handle asymmetric changes
            across different subsets of interfaces.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Interface.UpdateGroup'
          x-field-uid: 3
      x-reserved-field-uids: [1]

    UpdateProtocol.Config.Isis.Router.UpdateGroup:
      description: >-
        An update group targeting one or more IS-IS routers. All routers listed
        in names receive every attribute update specified in the attributes list.
        Use multiple update groups to apply different updates to different subsets
        of routers (asymmetric updates).
      type: object
      properties:
        names:
          description: >-
            The names of the IS-IS routers to which all attribute updates in
            this group will be applied.
          type: array
          items:
            type: string
            x-constraint:
            - "/components/schemas/Isis.Router/properties/name"
          x-field-uid: 1
        attributes:
          description: >-
            The list of router attribute updates to apply. Each entry selects one
            attribute via the choice discriminator. Multiple attributes can be updated
            in a single group without repeating the names list.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Router.Attribute'
          x-field-uid: 2

    UpdateProtocol.Config.Isis.Router.Attribute:
      description: >-
        A single IS-IS router attribute update. The choice field identifies which
        attribute is being changed.
      type: object
      properties:
        choice:
          description: >-
            The router attribute to be updated.
          type: string
          x-enum:
            learned_lsp_filter:
              x-field-uid: 1
            enable_wide_metric:
              x-field-uid: 2
            enable_attached_bit:
              x-field-uid: 3
            instance:
              x-field-uid: 4
          x-field-uid: 1
        learned_lsp_filter:
          description: >-
            When set to true, IS-IS LSPs received from neighbors are stored locally.
            When set to false, received LSPs are not stored.
            This is an on-the-fly (OTF) update; the IS-IS adjacency will remain up.
          type: boolean
          default: false
          x-field-uid: 2
        enable_wide_metric:
          description: >-
            When set to true, enables 32-bit wide metric encoding using TLV 135
            (Extended IP Reachability) and TLV 22 (Extended IS Reachability) as
            defined in RFC 5305. When set to false, the router uses narrow 6-bit
            metrics (TLV 128 and TLV 2).
            Updating this attribute will cause the IS-IS session to restart.
          type: boolean
          default: true
          x-field-uid: 3
        enable_attached_bit:
          description: >-
            When set to true, sets the attached bit in Level 1 LSPs to indicate that
            this router is connected to other areas (Level 2 domain), allowing Level 1
            only routers to use it as a default gateway to reach destinations outside
            the area. When set to false, the attached bit is cleared.
            Only applicable to level-1 and level-1-2 routers; setting this on a
            level-2 only router will result in an error.
            This is an on-the-fly (OTF) update; the updated bit is re-advertised in
            the next L1 LSP without flapping the IS-IS adjacency.
          type: boolean
          default: false
          x-field-uid: 4
        instance:
          description: >-
            The IS-IS instance identifier for this emulated IS-IS router (RFC 6822
            Section 3). Used to distinguish multiple IS-IS instances running on the
            same device. A value of 0 refers to the default IS-IS instance.
            Updating this attribute requires the IS-IS session to restart.
          type: integer
          format: uint32
          default: 1
          x-field-uid: 5

    UpdateProtocol.Config.Isis.Interface.UpdateGroup:
      description: >-
        An update group targeting one or more IS-IS interfaces. All interfaces
        listed in names receive every attribute update specified in the attributes
        list. Use multiple update groups to apply different updates to different
        subsets of interfaces (asymmetric updates).

        If the session is up but true on-the-fly update is not supported for an
        attribute (e.g. metric change on an emulated interface): a warning is
        returned indicating that the session will be disabled and re-enabled,
        and the updated attribute will be reflected once the session comes back up.
      type: object
      properties:
        names:
          description: >-
            The names of the IS-IS interfaces to which all attribute updates in
            this group will be applied.
          type: array
          items:
            type: string
            x-constraint:
            - "/components/schemas/Isis.Interface/properties/name"
          x-field-uid: 1
        attributes:
          description: >-
            The list of interface attribute updates to apply. Each entry selects one
            attribute via the choice discriminator. Multiple attributes can be updated
            in a single group without repeating the names list.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Interface.Attribute'
          x-field-uid: 2

    UpdateProtocol.Config.Isis.Interface.Attribute:
      description: >-
        A single IS-IS interface attribute update. The choice field identifies which
        attribute is being changed.
      type: object
      properties:
        choice:
          description: >-
            The interface attribute to be updated.
          type: string
          x-enum:
            metric:
              x-field-uid: 1
            priority:
              x-field-uid: 2
            traffic_engineering_metrics:
              x-field-uid: 3
          x-field-uid: 1
        metric:
          description: >-
            The metric value to be updated on the IS-IS interface.
            The maximum value of 16777215 (2^24-1) applies only when wide metric is
            enabled (RFC 3784). With narrow metrics the maximum is 63; values above
            63 will be rejected.
            Updating the metric on an emulated interface will flap the IS-IS session.
            Updating the metric on a simulated interface will maintain the IS-IS session
            in Up state and trigger an LSP update with the new metric value sent to neighbors.
          type: integer
          format: uint32
          maximum: 16777215
          default: 10
          x-field-uid: 2
        priority:
          description: >-
            The IS-IS DIS (Designated Intermediate System) election priority to be
            updated on the interface. A higher value indicates a higher preference
            for being elected DIS. A value of 0 prevents the router from being
            elected as DIS on this interface (ISO 10589 Section 8.4.2).
            Valid range is 0-127 (7-bit field).
            This is an on-the-fly (OTF) update; the updated priority is
            re-advertised in IIH PDUs without flapping the IS-IS adjacency.
          type: integer
          format: uint32
          maximum: 127
          default: 64
          x-field-uid: 3
        traffic_engineering_metrics:
          description: >-
            The traffic engineering metric values to be updated on the IS-IS interface.
            Traffic engineering metric updates are on-the-fly (OTF); the updated
            values are re-advertised in the next LSP without flapping the IS-IS adjacency.
          $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Interface.TrafficEngineeringMetrics'
          x-field-uid: 4

    UpdateProtocol.Config.Isis.Interface.TrafficEngineeringMetrics:
      description: >-
        The traffic engineering metric values to be updated on the IS-IS interface.
      type: object
      properties:
        choice:
          description: >-
            The traffic engineering metric to be updated on the IS-IS interface.
          type: string
          x-enum:
            administrative_group:
              x-field-uid: 1
            metric_level:
              x-field-uid: 2
            max_bandwidth:
              x-field-uid: 3
          x-field-uid: 1
        administrative_group:
          description: >-
            The Administrative group sub-TLV (sub-TLV 3, RFC 5305 Section 3.1).
            It is a 4-octet (32-bit) user-defined bit mask used to update
            administrative group numbers assigned to the interface.
            This is an on-the-fly (OTF) update; the updated value is re-advertised
            in the next LSP without flapping the IS-IS adjacency.
          type: string
          format: hex
          default: '00000000'
          x-field-uid: 2
        metric_level:
          description: >-
            The user-assigned TE link metric to update (sub-TLV 18,
            RFC 5305 Section 3.7). A value of 0 indicates the minimum link cost.
            This is an on-the-fly (OTF) update; the updated value is re-advertised
            in the next LSP without flapping the IS-IS adjacency.
          type: integer
          format: uint32
          default: 0
          x-field-uid: 3
        max_bandwidth:
          description: >-
            The maximum link bandwidth (sub-TLV 9, RFC 5305 Section 3.4) in bytes/sec
            to update for this link in one direction. The value is encoded on the wire
            as an IEEE 754 single-precision (32-bit) float; the uint32 value here
            represents the same bit pattern.
            This is an on-the-fly (OTF) update; the updated value is re-advertised
            in the next LSP without flapping the IS-IS adjacency.
          type: integer
          format: uint32
          default: 125000000
          x-field-uid: 4
