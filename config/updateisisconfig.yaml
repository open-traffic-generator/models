openapi: 3.0.3
info:
  title: Update protocol Config
  description: >-
    Update protocol Config for all control protocol schemas
  version: ^0.0.0
components:
  schemas:
    UpdateProtocol.Config.Isis:
      description: >-
        A container for IS-IS properties to be updated. Presence of this object
        indicates that one or more IS-IS properties require updating.
      type: object
      properties:
        router:
          description: >-
            Router-level IS-IS properties to be updated.
          $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Router'
          x-field-uid: 1

    UpdateProtocol.Config.Isis.Router:
      description: >-
        Router-level IS-IS properties to be updated.
      type: object
      required: [name]
      properties:
        name:
          description: >-
            The name of the IS-IS router to be updated.
          type: string
          x-constraint:
          - "/components/schemas/Device.IsisRouter/properties/name"
          x-field-uid: 1
        interfaces:
          description: >-
            List of IS-IS interface attribute updates. Each entry specifies a single
            attribute to update on a given interface via a choice. To update multiple
            attributes on the same interface, include multiple entries with the same
            interface_name and different choices.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Interface'
          x-field-uid: 2

    UpdateProtocol.Config.Isis.Interface:
      description: >-
        An IS-IS interface entry specifying a single attribute to be updated.
        Multiple entries with the same interface_name but different choices can
        be used to update more than one attribute on the same interface.
      type: object
      required: [interface_name]
      properties:
        interface_name:
          description: >-
            The name of the IS-IS emulated or simulated interface to be updated.
          type: string
          x-constraint:
          - "/components/schemas/Isis.Interface/properties/name"
          x-field-uid: 1
        choice:
          description: >-
            The attribute to be updated on this interface.
          type: string
          x-enum:
            metric:
              x-field-uid: 1
          x-field-uid: 2
        metric:
          description: >-
            The metric value to be updated on this IS-IS interface.
            Updating the metric on an emulated interface will flap the IS-IS session.
            Updating the metric on a simulated interface will maintain the IS-IS session
            in Up state and trigger an LSP update with the new metric value sent to neighbors.
          $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Interface.Metric'
          x-field-uid: 3

    UpdateProtocol.Config.Isis.Interface.Metric:
      description: >-
        The metric cost to be applied to the IS-IS interface.
      type: object
      properties:
        value:
          description: >-
            The metric cost for the interface.
          type: integer
          format: uint32
          maximum: 16777215
          default: 10
          x-field-uid: 1
