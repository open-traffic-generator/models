components:
  schemas:
    IsisLsps.State.Request:
      description: >-
        The request to retrieve ISIS Link State PDU (LSP) information learned by the
        router.
      type: object
      properties:
        isis_router_names:
          description: >-
            The names of ISIS routers for which learned information is requested.
            An empty list will return results for all ISIS routers.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Device.IsisRouter/properties/name"
          x-field-uid: 1
    IsisLsps.State:
      description: >-
        The result of ISIS LSP information that are retrieved.
      type: object
      properties:
        isis_router_name:
          description: >-
            The name of the ISIS Router.
          type: string
          x-field-uid: 1
        lsps:
          description: >-
            One or more LSPs that are learned by this ISIS router.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.State'
          x-field-uid: 2
    IsisLsp.State:
      description: >-
        ISIS LSP.
      type: object
      required: [lsp_id]
      properties:
        lsp_id:
          description: >-
            LSP ID in the format, e.g. '640000000001-00-00'.
            LSP ID consists of the System ID of a neighbor, the Pseudonode ID, and
            the LSP number.
            The last two bytes represent Pseudonode ID and LSP number respectively.
            A pseudonode is a logical representation of the LAN which is generated
            by a Designated Intermediate System (DIS)
            on a LAN segment. If one LSP exceeds the maximum LSP size then it is sent
            in another LSP with the LSP number incremented by one.
            A router's learned LSP gets refreshed by 'remaining_lifetime'. Then the
            sequence number is incremented by 1.
          type: string
          x-field-uid: 1
        pdu_type:
          description: >-
            Link State PDU type.
          type: string
          x-field-uid: 2
          x-enum:
            level_1:
              x-field-uid: 1
            level_2:
              x-field-uid: 2
        remaining_lifetime:
          description: >-
            Remaining lifetime in seconds before LSP expires.
          type: integer
          format: uint32
          x-field-uid: 3
        sequence_number:
          description: >-
            Sequence number of the LSP.
          type: integer
          format: uint64
          x-field-uid: 4
        pdu_length:
          description: >-
            Total length of the LSP.
          type: integer
          format: uint32
          maximum: 65535
          x-field-uid: 5
        flags:
          description: >-
            LSP Type-Block flags.
          $ref: '#/components/schemas/IsisLsp.Flags'
          x-field-uid: 6
        is_type:
          description: |-
            IS Type - bits 1 and 2 indicate the type of Intermediate System.
            1 - ( i.e. bit 1 set) Level 1 Intermediate system.
            2 - Unused value.
            3 - (i.e. bits 1 and 2 set) Level 2 Intermediate system. 
          type: integer
          format: uint32
          maximum: 3
          x-field-uid: 7
        tlvs:
          description: |-
            It refers to Link State PDU State TLVs container.
          $ref: '#/components/schemas/IsisLsp.Tlvs'
          x-field-uid: 8
    IsisLsp.Tlvs:
      description: >-
        This contains the list of TLVs present in one LSP.
      type: object
      properties:
        hostname_tlvs:
          description: >-
            Array of Hostname TLVs ( type 137) present in this LSP.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.Hostname'
          x-field-uid: 1
        is_reachability_tlvs:
          description: |-
            Array of IS-Reachability TLVs (type 2) present in this LSP.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.IsReachabilityTlv'
          x-field-uid: 2
        extended_is_reachability_tlvs:
          description: |-
            Array of Extended IS-Reachability TLVs (type 22) present in this LSP.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.ExtendedIsReachabilityTlv'
          x-field-uid: 3
        ipv4_internal_reachability_tlvs:
          description: |-
            Array of IPv4 Internal Reachability TLVs (type 128) present in this LSP.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.Ipv4InternalReachabilityTlv'
          x-field-uid: 4
        ipv4_external_reachability_tlvs:
          description: |-
            Array of IPv4 External Reachability TLVs (type 130) present in this LSP.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.Ipv4ExternalReachabilityTlv'
          x-field-uid: 5
        extended_ipv4_reachability_tlvs:
          description: |-
            Array of IPv4 Extended Reachability TLVs (type 135) present in this LSP.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.ExtendedIpv4ReachabilityTlv'
          x-field-uid: 6
        ipv6_reachability_tlvs:
          description: |-
            Array of IPv6 Reachability TLVs (type 236) present in this LSP.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.Ipv6ReachabilityTlv'
          x-field-uid: 7
        router_capabilities:
          description: |-
           IS-IS Router Capabilities: TLV 242.
           This container defines Router Capabilities.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.Capability'
          x-field-uid: 8
        srv6_locator_tlvs:
          description: |-
            Array of SRv6 Locator TLVs (type 27) present in this LSP.
            Each entry represents one SRv6 locator prefix advertisement,
            binding a node-local IPv6 prefix to an IGP algorithm and carrying
            node-local End SID Sub-TLVs for SRv6 endpoint behaviors.
            Reference: RFC 9352 Section 7.1.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.SRv6LocatorTlv'
          x-field-uid: 9
    IsisLsp.Hostname:
      description: >-
        It contains Hostname for the TLV 137.
      type: object
      properties:
        hostname:
          description: >-
            Hostname for an ISIS router.
          type: string
          x-field-uid: 1
    IsisLsp.Flags:
      description: >-
        LSP Type flags.
      type: object
      properties:
        partition_repair:
          description: |-
            When set, the originator supports partition repair.
          type: boolean
          x-field-uid: 1
        attached_error:
          description: |-
            When set, the originator is attached to another area using the referred metric.
          type: boolean
          x-field-uid: 2
        attached_expense:
          description: |-
            When set, the originator is attached to another
            area using the referred metric.
          type: boolean
          x-field-uid: 3
        attached_delay:
          description: |-
            Delay Metric - when set, the originator is attached to another
            area using the referred metric.
          type: boolean
          x-field-uid: 4
        attached_default:
          description: |-
            Default Metric - when set, the originator is attached to another
            area using the referred metric.
          type: boolean
          x-field-uid: 5
        overload:
          description: |-
            Overload bit - when set, the originator is overloaded, and must
            be avoided in path calculation.
          type: boolean
          x-field-uid: 6
    IsisLsp.IsReachabilityTlv:
      description: >-
        This container describes list of ISIS neighbors and attributes in IS-Reachability
        TLV (type 2).
      type: object
      properties:
        neighbors:
          description: >-
            This container describes Intermediate System (IS) neighbors.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.neighbor'
          x-field-uid: 1
    IsisLsp.ExtendedIsReachabilityTlv:
      description: >-
        This is list of ISIS neighbors and attributes in Extended-IS-Reachability
        TLV (type 22).
      type: object
      properties:
        neighbors:
          description: >-
            This container describes IS neighbors.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.ExtendedNeighbor'
          x-field-uid: 1
    IsisLsp.neighbor:
      description: >-
        This contains IS neighbors.
      type: object
      properties:
        system_id:
          description: >-
            The System ID for this emulated ISIS router, e.g. "640100010000".
          type: string
          format: hex
          x-field-uid: 1
    IsisLsp.ExtendedNeighbor:
      description: >-
        This contains IS neighbors.
      type: object
      properties:
        system_id:
          description: >-
            The System ID for this emulated ISIS router, e.g. "640100010000".
          type: string
          format: hex
          x-field-uid: 1
        adjacency_sids:
          description: |-
            List of SR-MPLS Adjacency SID sub-TLVs (sub-TLV types 31/32,
            RFC 8667) learned from this neighbor.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.AdjacencySid'
          x-field-uid: 2
        srv6_adj_sids:
          description: |-
            List of SRv6 Adjacency SID Sub-TLVs (End.X SID sub-TLV type 43
            for P2P or LAN End.X SID sub-TLV type 44 for broadcast) learned
            from this neighbor. Each entry carries a 128-bit SRv6 SID bound
            to a specific outgoing adjacency.
            Reference: RFC 9352 Sections 8.1-8.2.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.SRv6AdjSid'
          x-field-uid: 3
        
    IsisLsp.Ipv4InternalReachabilityTlv:
      description: |-
        This container defines list of IPv4 internal reachability information in one IPv4 internal reachability TLV.
        This is advertised when the origin-type is set 'internal' in route range configurations.
      type: object
      properties:
        prefixes:
          description: >-
            Describes list of IPv4 prefixes in this TLV.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.V4Prefix'
          x-field-uid: 1
    IsisLsp.Ipv4ExternalReachabilityTlv:
      description: |-
        This container defines list of IPv4 external reachability information in one IPv4 external reachability TLV.
        This is advertised when the origin-type is set 'external' in route range configurations.
      type: object
      properties:
        prefixes:
          description: >-
            Describes list of IPv4 prefixes in this TLV..
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.V4Prefix'
          x-field-uid: 1
    IsisLsp.V4Prefix:
      description: >-
        This group defines attributes of an IPv4 standard prefix.
      type: object
      properties:
        ipv4_address:
          description: >-
            An IPv4 unicast prefix reachable via the originator of this LSP.
          type: string
          x-field-uid: 1
        prefix_length:
          description: The length of the IPv4 prefix.
          type: integer
          format: uint32
          maximum: 32
          x-field-uid: 2
        redistribution_type:
          description: |-
            Up (0)-used when a prefix is initially advertised within the ISIS L3 hierarchy, 
              and for all other prefixes in L1 and L2 LSPs. (default) 
            Down (1)-used when an L1/L2 router advertises L2 prefixes in L1 LSPs. 
            The prefixes are being advertised from a higher level (L2) down to a lower level (L1). 
          type: string
          x-field-uid: 3
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
        default_metric:
          description: |-
            ISIS default metric value.
          type: integer
          format: uint32
          x-field-uid: 4
        origin_type:
          description: >-
            The origin of the advertised route-internal or external to the ISIS area.
            Options include the following: 
              Internal-for intra-area routes, through Level 1 LSPs. 
              External-for inter-area routes redistributed within L1, through Level
            1 LSPs.
          type: string
          x-field-uid: 5
          x-enum:
            internal:
              x-field-uid: 1
            external:
              x-field-uid: 2
    IsisLsp.ExtendedIpv4ReachabilityTlv:
      description: |-
        This container defines list of IPv4 extended reachability information in one Extended IPv4 External Reachability TLV.
        It is advertised when the 'wide metric' is enabled.
      type: object
      properties:
        prefixes:
          description: >-
            IPv4 prefix contained within extended reachability TLVs.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.ExtendedV4Prefix'
          x-field-uid: 1
    IsisLsp.ExtendedV4Prefix:
      description: >-
        This group defines attributes of an IPv4 standard prefix.
      type: object
      properties:
        ipv4_address:
          description: >-
            An IPv4 unicast prefix reachable via the originator of this LSP.
          type: string
          format: ipv4
          x-field-uid: 1
        prefix_length:
          description: The length of the IPv4 prefix.
          type: integer
          format: uint32
          maximum: 32
          x-field-uid: 2
        metric:
          description: >-
            ISIS wide metric.
          type: integer
          format: uint32
          x-field-uid: 3
        redistribution_type:
          description: |-
            Up (0)-used when a prefix is initially advertised within the ISIS L3 hierarchy, 
              and for all other prefixes in L1 and L2 LSPs. (default) 
            Down (1)-used when an L1/L2 router advertises L2 prefixes in L1 LSPs. 
            The prefixes are being advertised from a higher level (L2) down to a lower level (L1). 
          type: string
          x-field-uid: 4
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
        prefix_attributes:
          description: |-
            Extended Prefix Attribute flags container sub-TLV is type 4.
          $ref: '#/components/schemas/IsisLsp.PrefixAttributes'
          x-field-uid: 5
        prefix_sids:
          description: |-
            Prefix Segment-ID list. IGP-Prefix Segment is an IGP segment attached to an IGP prefix. An IGP-Prefix Segment is global
            (unless explicitly advertised otherwise) within the SR/IGP domain.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.PrefixSid'
          x-field-uid: 6

    IsisLsp.Ipv6ReachabilityTlv:
      description: |-
        It defines list of IPv6 extended reachability information in one IPv6 Reachability TLV.
      type: object
      properties:
        prefixes:
          description: >-
            IPv6 prefix contained within reachability TLVs.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.V6Prefix'
          x-field-uid: 1
    IsisLsp.V6Prefix:
      description: >-
        It defines attributes of an IPv6 standard prefix.
      type: object
      properties:
        ipv6_address:
          description: >-
            An IPv6 unicast prefix reachable via the originator of this LSP.
          type: string
          format: ipv6
          x-field-uid: 1
        prefix_length:
          description: The length of the IPv6 prefix.
          type: integer
          format: uint32
          maximum: 128
          x-field-uid: 2
        metric:
          description: >-
            ISIS wide metric.
          type: integer
          format: uint32
          x-field-uid: 3
        redistribution_type:
          description: |-
            Up (0)-used when a prefix is initially advertised within the ISIS L3 hierarchy, 
              and for all other prefixes in L1 and L2 LSPs. (default) 
            Down (1)-used when an L1/L2 router advertises L2 prefixes in L1 LSPs. 
            The prefixes are being advertised from a higher level (L2) down to a lower level (L1). 
          type: string
          x-field-uid: 4
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
        origin_type:
          description: >-
            The origin of the advertised route-internal or external to the ISIS area.
            Options include the following: 
              Internal-for intra-area routes, through Level 1 LSPs. 
              External-for inter-area routes redistributed within L1, through Level
            1 LSPs.
          type: string
          x-field-uid: 5
          x-enum:
            internal:
              x-field-uid: 1
            external:
              x-field-uid: 2
        prefix_attributes:
          description: |-
            Extended Prefix Attribute flags container sub-TLV is type 4.
          $ref: '#/components/schemas/IsisLsp.PrefixAttributes'
          x-field-uid: 6
        prefix_sids:
          description: |-
            Prefix Segment-ID list. IGP-Prefix Segment is an IGP segment attached to an IGP prefix. An IGP-Prefix Segment is global
            (unless explicitly advertised otherwise) within the SR/IGP domain.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.PrefixSid'
          x-field-uid: 7
          
    IsisLsp.PrefixAttributes:
      description: >-
        One bit value of ISIS Prefix attributes for the extended IPv4 and IPv6 reachability.
        https://www.rfc-editor.org/rfc/rfc7794.html.
      type: object
      properties:
        x_flag:
          description: |-
            External prefix flag (Bit 0). Set if the prefix has been
            redistributed from another protocol. This includes
            the case where multiple virtual routers are
            supported and the source of the redistributed prefix
            is another IS-IS instance.
          type: boolean
          x-field-uid: 1
        r_flag:
          description: |-
            Readvertisement flag (Bit 1). Set when the prefix has been
            leaked from one level to another (upwards or
            downwards).
          type: boolean
          x-field-uid: 2
        n_flag:
          description: |-
            Node Flag (Bit 2).
            Set when the prefix identifies the
            advertising router, i.e., the prefix is a host
            prefix advertising  a globally reachable address
            typically associated with a loopback address.
          type: boolean
          x-field-uid: 3
    
    IsisLsp.PrefixSid:
      description: >-
        This contains the properties of IS-IS Prefix-SID and its attributes for 
        the extended Ipv4 and Ipv6 reachability.
        Refernce: https://datatracker.ietf.org/doc/html/rfc8667#name-prefix-segment-identifier-p.
      type: object
      properties:
        sids:
          description: >-
            One or more SIDs/Indices are the SID/Label values associated 
            with the IGP Prefix segment attached to the specific IPv4 or IPv6 prefix.
          type: array
          items:
            type: integer
            format: uint32
          x-field-uid: 1
        flags:
          description: |-
            Flags associated with Prefix Segment-ID.
          $ref: '#/components/schemas/IsisLsp.PrefixSidFlags'
          x-field-uid: 2
        algorithm:
          description: |-
            The Isis may use various algorithms when calculating
            reachability to other nodes or to prefixes attached to these
            nodes. 
          type: integer
          format: uint32
          minimum: 0
          maximum: 255
          x-field-uid: 3

    IsisLsp.Capability:
      description: >-
        Container of IS-IS Router CAPABILITY TLV.
      type: object
      properties:
        router_cap_id:
          description: >-
            Router CapabilityID in IPv4 address format.
          type: string
          format: ipv4
          x-field-uid: 1
        s_bit:
          description: |-
            S bit (0x01): If the S bit is set(1), the IS-IS Router CAPABILITY TLV
            MUST be flooded across the entire routing domain.  If the S bit is
            not set(0), the TLV MUST NOT be leaked between levels.  This bit MUST
            NOT be altered during the TLV leaking.
          type: string
          x-enum:
            flood:
              x-field-uid: 1
            not_flood:
              x-field-uid: 2
          x-field-uid: 2
        d_bit:
          description: |-
            D bit (0x02): When the IS-IS Router CAPABILITY TLV is leaked from
            Level 2 (L2) to Level 1 (L1), the D bit MUST be set.  Otherwise, this
            bit MUST be clear.  IS-IS Router CAPABILITY TLVs with the D bit set
            MUST NOT be leaked from Level 1 to Level 2.  This is to prevent TLV looping.
          type: string
          x-enum:
            down:
              x-field-uid: 1
            not_down:
              x-field-uid: 2
          x-field-uid: 3
        sr_capability:
          description: |-
            SR-Capabilities.      
          $ref: '#/components/schemas/IsisLsp.SRCapability'
          x-field-uid: 4     
        algorithms:
          description: |-
            This contains one or more SR-Algorithm.
          type: array
          items:
            type: integer
            format: uint32
          x-field-uid: 5
        srlb_ranges:
          description: |-
            This contains the list of SR Local Block (SRLB)
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.Srlb'
          x-field-uid: 6
        srv6_capability:
          description: |-
            SRv6 Capabilities Sub-TLV (sub-TLV type 25) present within this
            Router CAPABILITY TLV. Announces that the originating router is
            an SRv6 Segment Endpoint Node, indicates OAM support (O-flag),
            and carries node-level SRv6 Maximum SID Depth (MSD) values.
            Reference: RFC 9352 Section 2, RFC 8491.
          $ref: '#/components/schemas/IsisLsp.SRv6Capability'
          x-field-uid: 7

    IsisLsp.SRCapability:
      description: |-
        Container of IS-IS SR-CAPABILITY Sub-Tlv.
      type: object
      properties:
        flags:
          description: |-
            1 octet of flags.
          $ref: '#/components/schemas/IsisLsp.CapasFlags'
          x-field-uid: 1
        srgb_ranges:
          description: |-
            This contains the list of SRGB.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.Srgb'
          x-field-uid: 2

    IsisLsp.CapasFlags:
      description: |-
        Container for the configuration of IS-IS SR-CAPABILITY flags.
      type: object
      properties:
        ipv4_mpls:
          description: |-
            I-Flag for the MPLS IPv4 Flag. If set, then the router is capable of processing SR-MPLS-encapsulated IPv4 packets on all interfaces.
          type: boolean
          x-field-uid: 1
        ipv6_mpls:
          description: |-
            V-Flag for the MPLS IPv6 Flag. If set, then the router is capable of processing SR-MPLS-encapsulated IPv6 packets on all interfaces.
          type: boolean
          x-field-uid: 2

    IsisLsp.Srgb:
      description: >-
        This contains the propeties of SRGB range.
        Reference: https://datatracker.ietf.org/doc/html/rfc8667#section-3.1-7.1.1
      type: object
      properties:
        starting_sid:
          description: >-
            The SID/Label sub-TLV contains the first value of the SRGB while the range contains the number of SRGB elements.
          type: integer
          format: uint32
          x-field-uid: 1
        range:
          description: >-
            This represents the number of SID in a SRGB range. 
          type: integer
          format: uint32
          x-field-uid: 2

    IsisLsp.Srlb:
      description: >-
        This contains the propeties of SRLB. The SR Local Block (SRLB) sub-TLV contains the range of labels the node has reserved 
        for Local SIDs. Local SIDs are used, e.g., for Adj-SIDs, and may also be allocated by components other than the IS-IS protocol
        Reference: https://datatracker.ietf.org/doc/html/rfc8667#name-sr-local-block-sub-tlv.
      type: object
      properties:
        starting_sid:
          description: >-
            The SID/Label sub-TLV contains the first value of the SRGB while the range contains the number of SRGB elements.
          type: integer
          format: uint32
          x-field-uid: 1
        range:
          description: >-
            This represents the number of SID in a SRGB range. 
          type: integer
          format: uint32
          x-field-uid: 2
    
    IsisLsp.AdjacencySid:
      description: |-
        This container defines segment routing adjacency SIDs.
      type: object
      properties:
        type:
          description: |-
            Adjacency-SID type: Adjacency SIDs(31) or LAN adjacency SID (32).
          type: string
          x-field-uid: 4
          x-enum:
            adj_sid:
              x-field-uid: 1
            lan_adj_sid:
              x-field-uid: 2
          x-field-uid: 1
        sids:
          description: >-
            One or more SID/Indices are the SID/Label values associated with the IGP adjacency SID.
          type: array
          items:
            type: integer
            format: uint32
          x-field-uid: 2
        flags:
          description: |-
            Flags associated with Adjacency Segment-ID.
          $ref: '#/components/schemas/IsisLsp.AdjSidFlags'
          x-field-uid: 3
        weight:
          description: |-
            The value represents the weight of the Adj-SID for the purpose of load balancing. 
          type: integer
          format: uint32
          x-field-uid: 4 

    IsisLsp.PrefixSidFlags:
      description: >-
        Conatiner of 1-octet Flags associated with Prefix Segment-ID.
      type: object
      properties:
        r_flag:
          description: |-
            Readvertisment flag. When set, the prefix to which this Prefix-SID is attached, has been propagated by
            the router either from another level or from redistribution.
          type: boolean
          x-field-uid: 1
        n_flag:
          description: |-
            Node flag. When set, the Prefix-SID refers to the router identified by the prefix. Typically, the
            N-Flag is set on Prefix-SIDs attached to a router loopback address.
          type: boolean
          x-field-uid: 2
        p_flag:
          description: |-
            Penultimate-Hop-Popping flag. When set, then the penultimate hop MUST NOT pop the Prefix-SID before
            delivering the packet to the node that advertised the Prefix-SID.
          type: boolean
          x-field-uid: 3
        e_flag:
          description: |-
            Explicit-Null flag. When set, any upstream neighbor of the Prefix-SID originator MUST replace the
            Prefix-SID with a Prefix-SID having an Explicit-NULL value (0 for IPv4 and 2 for IPv6) before forwarding
            the packet.
          type: boolean
          x-field-uid: 4
        v_flag:
          description: |-
            Value flag. When set, the Prefix-SID carries avalue (instead of an index).
          type: boolean
          x-field-uid: 5
        l_flag:
          description: |-
            Local flag. When set, the value/index carried by the Prefix-SID has local significance.
          type: boolean
          x-field-uid: 6
    
    IsisLsp.AdjSidFlags:
      description: >-
        Conatiner of 1-octet Flags associated with Adjacency Segment-ID.
      type: object
      properties:
        f_flag:
          description: |-
            The address family flag. If unset, then the Adj-SID refers
            to an adjacency with outgoing IPv4 encapsulation.  If set then
            the Adj-SID refers to an adjacency with outgoing IPv6
            encapsulation.
          type: boolean
          x-field-uid: 1
        b_flag:
          description: |-
            The backup flag. If set, the Adj-SID is eligible for protection.
          type: boolean
          x-field-uid: 2
        v_flag:
          description: |-
            The value flag. If set, then the Adj-SID carries a value.
          type: boolean
          x-field-uid: 3
        l_flag:
          description: |-
            The local flag.  If set, then the value/index carried by
            the Adj-SID has local significance.
          type: boolean
          x-field-uid: 4
        s_flag:
          description: |-
            The set flag. When set, the S-Flag indicates that the
            Adj-SID refers to a set of adjacencies (and therefore MAY be
            assigned to other adjacencies as well).
          type: boolean
          x-field-uid: 5
        p_flag:
          description: |-
            The persistent flag. When set, the P-Flag indicates that
            the Adj-SID is persistently allocated, i.e., the Adj-SID value
            remains consistent across router restart and/or interface flap.
          type: boolean
          x-field-uid: 6

    IsisLsp.SRv6Capability:
      description: >-
        SRv6 Capabilities Sub-TLV (sub-TLV type 25) learned from the IS-IS
        Router CAPABILITY TLV (TLV 242) in a received LSP. Indicates that the
        originating router is an SRv6 Segment Endpoint Node and carries
        optional OAM support (O-flag) and node-level SRv6 MSD values.
        Reference: RFC 9352 Section 2, RFC 8491.
      type: object
      properties:
        o_flag:
          description: >-
            OAM flag (bit 1). When set, the originating router supports the
            use of the O-bit in the Segment Routing Header (SRH) for OAM
            operations as defined in RFC 9259.
          type: boolean
          x-field-uid: 1
        node_msds:
          description: >-
            Node-level SRv6 Maximum SID Depth (MSD) values learned from
            MSD sub-TLVs within the Router Capability TLV.
          $ref: '#/components/schemas/IsisLsp.SRv6NodeMsd'
          x-field-uid: 2
        c_flag:
          description: >-
            Compression (uSID) flag. When set, the originating router supports
            Micro-SID (uSID) compressed encoding for SRv6 SIDs. Learned from
            the Flags field of the SRv6 Capabilities Sub-TLV (sub-TLV type 25).
            Reference: RFC 9352 Section 2, RFC 9800.
          type: boolean
          x-field-uid: 3

    IsisLsp.SRv6NodeMsd:
      description: >-
        Node-level SRv6 Maximum SID Depth (MSD) values learned from a
        received LSP. Each field represents the advertised depth limit for
        a specific SRv6 forwarding behavior.
        MSD Type 41 = Max SL, Type 42 = Max End Pop, Type 44 = Max H.Encaps,
        Type 45 = Max End D.
        Reference: RFC 8491, RFC 9352 Section 6.
      type: object
      properties:
        max_sl:
          description: >-
            Maximum value of the Segments Left (SL) field in an SRH that
            the originating router can process (MSD-Type 41). Absent if not
            advertised; value of 0 means no SRH processing support.
          type: integer
          format: uint32
          maximum: 255
          x-field-uid: 1
        max_end_pop_srh:
          description: >-
            Maximum number of SIDs in the top SRH that the originating
            router can pop using PSP or USP End behaviors (MSD-Type 42).
            Absent if not advertised.
          type: integer
          format: uint32
          maximum: 255
          x-field-uid: 2
        max_h_encaps:
          description: >-
            Maximum number of SIDs the originating router can push via
            H.Encaps behavior (MSD-Type 44). Absent if not advertised.
          type: integer
          format: uint32
          maximum: 255
          x-field-uid: 3
        max_end_d_srh:
          description: >-
            Maximum number of SIDs in the SRH the originating router can
            handle for decapsulation behaviors End.DT4/DT6/DT46/DX4/DX6
            (MSD-Type 45). Absent if not advertised.
          type: integer
          format: uint32
          maximum: 255
          x-field-uid: 4
        max_t_insert:
          description: >-
            Maximum number of SIDs the originating router can insert using
            the T.Insert headend behavior (MSD-Type 43, RFC 8491). Absent
            if not advertised by the originating router.
          type: integer
          format: uint32
          maximum: 255
          x-field-uid: 5

    IsisLsp.SRv6LocatorTlv:
      description: >-
        SRv6 Locator TLV (TLV type 27) learned from a received IS-IS LSP.
        Carries an SRv6 locator prefix that identifies the originating node,
        the associated IGP algorithm, metric, and a list of locally
        instantiated End SID Sub-TLVs.
        Reference: RFC 9352 Section 7.1.
      type: object
      properties:
        locator:
          description: >-
            The SRv6 locator IPv6 prefix advertised in this TLV.
          type: string
          format: ipv6
          x-field-uid: 1
        prefix_length:
          description: >-
            Number of significant bits in the locator field (1-128).
          type: integer
          format: uint32
          minimum: 1
          maximum: 128
          x-field-uid: 2
        algorithm:
          description: >-
            IGP algorithm identifier for this locator. 0 = SPF, 1 = Strict
            SPF, 128-255 = Flex-Algo (RFC 9350, RFC 8665).
          type: integer
          format: uint32
          minimum: 0
          maximum: 255
          x-field-uid: 3
        metric:
          description: >-
            The metric (cost) associated with this SRv6 locator prefix.
          type: integer
          format: uint32
          x-field-uid: 4
        redistribution_type:
          description: >-
            Up/Down redistribution bit for this locator advertisement.
            'up' = normal advertisement; 'down' = leaked from L2 to L1.
          type: string
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
          x-field-uid: 5
        d_flag:
          description: >-
            Down bit (D-flag). Set when this locator was leaked from
            Level 2 to Level 1 (RFC 9352 Section 7.1).
          type: boolean
          x-field-uid: 6
        mt_id:
          description: >-
            Multi-Topology ID for this locator. 0 = default topology.
          type: integer
          format: uint32
          maximum: 4095
          x-field-uid: 7
        end_sids:
          description: >-
            List of SRv6 End SID Sub-TLVs (sub-TLV type 5) carried within
            this Locator TLV. Each entry describes a node-local SRv6 SID
            and its endpoint behavior.
            Reference: RFC 9352 Section 7.2.
          type: array
          items:
            $ref: '#/components/schemas/IsisLsp.SRv6EndSid'
          x-field-uid: 8
        advertise_locator_as_prefix:
          description: >-
            Present when the originating router also advertised this locator
            as an IS-IS IPv6 Reachability prefix (TLV 236/237). Carries the
            prefix attribute flags received in that advertisement.
          $ref: '#/components/schemas/IsisLsp.SRv6AdvertisedLocatorAsPrefix'
          x-field-uid: 9

    IsisLsp.SRv6AdvertisedLocatorAsPrefix:
      description: >-
        Learned state for the secondary IPv6 Reachability prefix advertisement
        (TLV 236/237) of an SRv6 locator. Present only when the originating
        router advertised the locator prefix alongside the SRv6 Locator TLV.
        Reference: RFC 9352 Section 7.1.
      type: object
      properties:
        prefix_attributes:
          description: >-
            Prefix Attribute Flags Sub-TLV (sub-TLV type 4, RFC 7794) received
            in the locator's IPv6 Reachability advertisement. Present only if
            the originating router included this sub-TLV.
          $ref: '#/components/schemas/IsisLsp.SRv6PrefixAttributes'
          x-field-uid: 1

    IsisLsp.SRv6PrefixAttributes:
      description: >-
        Prefix Attribute Flags Sub-TLV (sub-TLV type 4, RFC 7794) learned from
        the IPv6 Reachability advertisement of an SRv6 locator prefix.
        Reference: RFC 7794.
      type: object
      properties:
        x_flag:
          description: >-
            External prefix flag (bit 0, RFC 7794). Set if the locator prefix
            was redistributed from another protocol.
          type: boolean
          x-field-uid: 1
        r_flag:
          description: >-
            Re-advertisement flag (bit 1, RFC 7794). Set if the locator prefix
            was leaked between IS-IS levels.
          type: boolean
          x-field-uid: 2
        n_flag:
          description: >-
            Node flag (bit 2, RFC 7794). Set if this prefix identifies the
            advertising router.
          type: boolean
          x-field-uid: 3
        a_flag:
          description: >-
            Anycast flag (bit 5, RFC 7794). Set if this locator is an anycast
            prefix shared across multiple routers.
          type: boolean
          x-field-uid: 4

    IsisLsp.SRv6EndSid:
      description: >-
        SRv6 End SID Sub-TLV (sub-TLV type 5) learned from an SRv6 Locator
        TLV (type 27) in a received LSP. Describes a node-local SRv6 SID,
        its endpoint behavior, and optional SID structure information.
        Reference: RFC 9352 Section 7.2, RFC 8986.
      type: object
      properties:
        sid:
          description: >-
            The 128-bit SRv6 SID value in IPv6 address format.
          type: string
          format: ipv6
          x-field-uid: 1
        endpoint_behavior:
          description: >-
            Endpoint behavior codepoint for this End SID (RFC 8986 Section 7.4).
            Indicates how the originating router processes packets arriving
            with this SID as the Active Segment.
          type: string
          x-enum:
            end:
              description: End (RFC 8986 codepoint 1).
              x-field-uid: 1
            end_with_psp:
              description: End with PSP flavor (RFC 8986 codepoint 2).
              x-field-uid: 2
            end_with_usp:
              description: End with USP flavor (RFC 8986 codepoint 3).
              x-field-uid: 3
            end_with_psp_usp:
              description: End with PSP+USP flavors (RFC 8986 codepoint 4).
              x-field-uid: 4
            end_with_usd:
              description: End with USD flavor (RFC 8986 codepoint 28).
              x-field-uid: 5
            end_with_psp_usd:
              description: End with PSP+USD flavors (RFC 8986 codepoint 29).
              x-field-uid: 6
            end_with_usp_usd:
              description: End with USP+USD flavors (RFC 8986 codepoint 30).
              x-field-uid: 7
            end_with_psp_usp_usd:
              description: End with PSP+USP+USD flavors (RFC 8986 codepoint 31).
              x-field-uid: 8
            end_dt4:
              description: End.DT4 IPv4 table lookup (RFC 8986 codepoint 19).
              x-field-uid: 9
            end_dt6:
              description: End.DT6 IPv6 table lookup (RFC 8986 codepoint 18).
              x-field-uid: 10
            end_dt46:
              description: End.DT46 dual-stack table lookup (RFC 8986 codepoint 20).
              x-field-uid: 11
          x-field-uid: 2
        sid_structure:
          description: >-
            SRv6 SID Structure Sub-Sub-TLV (type 1) if present, describing
            the bit-field decomposition of this SID value. Specifies Locator
            Block, Locator Node, Function, and Argument lengths in bits.
            Reference: RFC 9352 Section 9.
          $ref: '#/components/schemas/IsisLsp.SRv6SidStructure'
          x-field-uid: 3

    IsisLsp.SRv6AdjSid:
      description: >-
        SRv6 Adjacency SID Sub-TLV learned from the Extended IS Reachability
        TLV (type 22) or MT-ISN TLV (type 222) in a received LSP.
        Point-to-point End.X SID Sub-TLV has sub-TLV type 43; LAN End.X SID
        Sub-TLV has sub-TLV type 44 and includes the neighbor System ID.
        Reference: RFC 9352 Sections 8.1-8.2, RFC 8986.
      type: object
      properties:
        type:
          description: >-
            The sub-TLV type that carried this adjacency SID.
            'end_x_sid' = point-to-point (sub-TLV type 43);
            'lan_end_x_sid' = LAN adjacency (sub-TLV type 44, includes
            neighbor System ID in neighbor_id field).
          type: string
          x-enum:
            end_x_sid:
              x-field-uid: 1
            lan_end_x_sid:
              x-field-uid: 2
          x-field-uid: 1
        neighbor_id:
          description: >-
            IS-IS System ID of the LAN neighbor from which this End.X SID
            was received. Present only when type is 'lan_end_x_sid'
            (sub-TLV type 44, RFC 9352 Section 8.2).
          type: string
          format: hex
          x-field-uid: 2
        sid:
          description: >-
            The 128-bit SRv6 End.X SID value in IPv6 address format.
          type: string
          format: ipv6
          x-field-uid: 3
        endpoint_behavior:
          description: >-
            Endpoint behavior codepoint for this adjacency SID
            (RFC 8986 Section 7.4).
          type: string
          x-enum:
            end_x:
              description: End.X adjacency cross-connect (RFC 8986 codepoint 5).
              x-field-uid: 1
            end_x_with_psp:
              description: End.X with PSP flavor (RFC 8986 codepoint 6).
              x-field-uid: 2
            end_x_with_usp:
              description: End.X with USP flavor (RFC 8986 codepoint 7).
              x-field-uid: 3
            end_x_with_psp_usp:
              description: End.X with PSP+USP flavors (RFC 8986 codepoint 8).
              x-field-uid: 4
            end_x_with_usd:
              description: End.X with USD flavor (RFC 8986 codepoint 32).
              x-field-uid: 5
            end_x_with_psp_usd:
              description: End.X with PSP+USD flavors (RFC 8986 codepoint 33).
              x-field-uid: 6
            end_x_with_usp_usd:
              description: End.X with USP+USD flavors (RFC 8986 codepoint 34).
              x-field-uid: 7
            end_x_with_psp_usp_usd:
              description: End.X with PSP+USP+USD flavors (RFC 8986 codepoint 35).
              x-field-uid: 8
            end_dx4:
              description: End.DX4 IPv4 cross-connect (RFC 8986 codepoint 17).
              x-field-uid: 9
            end_dx6:
              description: End.DX6 IPv6 cross-connect (RFC 8986 codepoint 16).
              x-field-uid: 10
          x-field-uid: 4
        b_flag:
          description: >-
            Backup flag. When set, this End.X SID is eligible for IP-FRR
            protection (RFC 9352 Section 8.1).
          type: boolean
          x-field-uid: 5
        s_flag:
          description: >-
            Set flag. When set, this End.X SID refers to a set of adjacencies
            (RFC 9352 Section 8.1).
          type: boolean
          x-field-uid: 6
        p_flag:
          description: >-
            Persistent flag. When set, the SID value is stable across router
            restarts and interface flaps (RFC 9352 Section 8.1).
          type: boolean
          x-field-uid: 7
        weight:
          description: >-
            Weight for load balancing across the adjacency set when S-flag
            is set (RFC 9352 Section 8.1).
          type: integer
          format: uint32
          maximum: 255
          x-field-uid: 8
        algorithm:
          description: >-
            IGP algorithm bound to this adjacency SID. 0 = SPF, 1 = Strict
            SPF, 128-255 = Flex-Algo (RFC 9350, RFC 8665).
          type: integer
          format: uint32
          minimum: 0
          maximum: 255
          x-field-uid: 9
        sid_structure:
          description: >-
            SRv6 SID Structure Sub-Sub-TLV (type 1) if present, describing
            the internal bit-field decomposition of this adjacency SID.
            Reference: RFC 9352 Section 9.
          $ref: '#/components/schemas/IsisLsp.SRv6SidStructure'
          x-field-uid: 10

    IsisLsp.SRv6SidStructure:
      description: >-
        SRv6 SID Structure Sub-Sub-TLV (type 1) learned from a received LSP.
        Describes the internal bit-field decomposition of an SRv6 SID,
        enabling routers to independently interpret each component of the
        128-bit SID value.
        The sum of all four length fields must not exceed 128 bits.
        Reference: RFC 9352 Section 9.
      type: object
      properties:
        locator_block_length:
          description: >-
            Number of bits in the Locator Block (LB) field of the SID. The
            common IPv6 prefix shared by all SIDs in the same SRv6 domain
            block (e.g., 32 bits in the uSID F3216 format).
          type: integer
          format: uint32
          maximum: 128
          x-field-uid: 1
        locator_node_length:
          description: >-
            Number of bits in the Locator Node (LN) field of the SID.
            Identifies the specific node within the Locator Block
            (e.g., 16 bits in the uSID F3216 format).
          type: integer
          format: uint32
          maximum: 128
          x-field-uid: 2
        function_length:
          description: >-
            Number of bits in the Function field of the SID. Identifies the
            specific endpoint behavior on this node (e.g., 16 bits in the
            uSID F3216 format).
          type: integer
          format: uint32
          maximum: 128
          x-field-uid: 3
        argument_length:
          description: >-
            Number of bits in the Argument field of the SID. Used for VPN
            table IDs or compressed next-SID encodings in Micro-SID stacking.
            0 for standard SIDs without argument (RFC 9800).
          type: integer
          format: uint32
          maximum: 128
          x-field-uid: 4
