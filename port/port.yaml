openapi: 3.0.3
info:
  title: Port models
  version: ^0.0.0
components:
  schemas:
    Port:
      description: >-
        An abstract test port.
      type: object
      properties:
        location:
          description: >-
            The location of a test port.  It is the endpoint where packets will emit
            from.

            Test port locations can be the following:
              - physical appliance with multiple ports
              - physical chassis with multiple cards and ports
              - local interface
              - virtual machine, docker container, kubernetes cluster

            The test port location format is implementation specific.
            Use the /results/capabilities API to determine what formats an  implementation
            supports for the location property.

            Get the configured location state by using the /results/port API.
          type: string
          x-field-uid: 1
        name:
          x-include: ../common/common.yaml#/components/schemas/Named.Object/properties/name
          x-field-uid: 2
      required: [name]
    Port.Options:
      description: >-
        Common port options that apply to all configured Port objects. 
      type: object
      properties:
        location_preemption:
          description: >-
            Preempt all the test port locations as defined by the  Port.Port.properties.location.
            If the test ports defined by their location values are in use and  this
            value is true, the test ports will be preempted.
          type: boolean
          default: false
          x-field-uid: 1
        data_integrity:
          description: >-
            Check and validate that flow payload has not been modified when received on Rx port.
            It applies to all flows across all ports and if set to true, it is reported in data
            integrity in port statistics with frame count both for frames with unmodified payload as
            frames_rx and for frames which has payload modified during transit as errors.
          type: boolean
          default: false
          x-field-uid: 2
        frame_ordering_mode:
          $ref: '#/components/schemas/Port.Options.FrameOrderingMode'
          x-field-uid: 3
    Port.Options.FrameOrderingMode:
      description: >-
        Controls how an implementation arranges (interleaves) the frames of multiple
        flows that share source ports and destination ports.

        A flow transmits frames from its source port(s) to its
        destination port(s). When multiple flows transmit simultaneously towards a
        common destination port, the transmit ordering determines how the frames of the
        different flows are interleaved on the wire from the source ports. This is
        independent of the per-flow payload sequence used for loss and latency
        measurement.

      type: object
      properties:
        choice:
          description: >-
            The type of frame ordering mode.


            - no_ordering: No specific ordering is applied across flows when frames are
            transmitted from the source ports. The implementation is free to interleave the
            frames of concurrent flows towards the destination ports in whatever manner is most
            efficient. This is the lowest-overhead setting and is appropriate when per-flow
            transmit sequence integrity is not being measured, for example pure throughput or
            line-rate saturation, loss-only or latency-only measurements, a single flow from
            one source port to one destination port, and protocol emulation traffic whose
            ordering is governed by the protocol itself.


            - rfc2889: Transmit ordering follows the methodology defined in RFC 2889, "Benchmarking
            Methodology for LAN Switching Devices". The interleaved frames of flow that share
            source ports and destination ports are arranged using round-robin sequencing before
            they are transmitted from the source ports. This prevents a destination port from
            being overloaded by simultaneous flows arriving from multiple source ports and keeps
            per-flow sequencing valid under load. It is appropriate for RFC 2889 test types such
            as fully-meshed (many source ports to many destination ports) forwarding, congestion
            control / head-of-line blocking (many source ports to one destination port), and
            maximum forwarding rate measurements.
          type: string
          default: no_ordering
          x-field-uid: 1
          x-enum:
            no_ordering:
              x-field-uid: 1
            rfc2889:
              x-field-uid: 2
