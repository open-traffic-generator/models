openapi: 3.0.3
info:
  title: Update BGP protocol Config
  description: >-
    Update BGP protocol Config for BGP control protocol schema.
  version: ^0.0.0
components:
  schemas:
    UpdateProtocol.Config.Bgp:
      description: >-
        A container for BGP properties to be updated. Presence of this object
        indicates that one or more BGP properties require updating.
        The choice field selects the category of attributes to be updated.
        Router-level and interface-level updates are controlled independently.
      type: object
      properties:    
        routers:
          description: >-
            List of BGP router-level update entries. Populate this field to
            update router-level attributes independently of interface-level attributes.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Bgp.Router.UpdateGroup'
          x-field-uid: 1
        v4route_ranges:
          description: >-
            List of BGP IPv4 route range update entries. Populate this field to
            update route range attributes independently of router-level attributes.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Bgp.V4RouteRange.UpdateGroup'
          x-field-uid: 2
        v6route_ranges:
          description: >-
            List of BGP IPv6 route range update entries. Populate this field to
            update route range attributes independently of router-level attributes.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Bgp.V6RouteRange.UpdateGroup'
          x-field-uid: 3


    UpdateProtocol.Config.Bgp.Router.UpdateGroup:
      description: >-
        A BGP router entry for router-level attribute updates.
      type: object
      properties:
        names:
          description: >-
            Names of the BGP router to be updated.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Device.BgpRouter/properties/name"
          x-field-uid: 1
        choice:
          description: >-
            The category of router attributes to be updated. The properties
            field contains the actual attribute updates.
          type: string
          x-enum:
            local_as:
              x-field-uid: 1
            router_id:
              x-field-uid: 2
            hold_time:
              x-field-uid: 3
            keepalive_time:
              x-field-uid: 4
            advanced:
              x-field-uid: 5
          x-field-uid: 2
        local_as:
          description: >-
            The local AS number to be updated on the BGP router.
          type: integer
          format: uint32
          maximum: 4294967295
          default: 65000
          x-field-uid: 3
        router_id:
          description: >-
            The router ID to be updated on the BGP router.
          type: string
          format: ipv4
          x-field-uid: 4
        hold_time:
          description: >-
            The hold time in seconds to be updated on the BGP router.
          type: integer
          format: uint32
          maximum: 65535
          default: 90
          x-field-uid: 5
        keepalive_time:
          description: >-
            The keepalive time in seconds to be updated on the BGP router.
          type: integer
          format: uint32
          maximum: 65535
          default: 30
          x-field-uid: 6
        advanced:
          description: >-
            The advanced properties of a BGP Router to be updated.
          $ref: '#/components/schemas/UpdateProtocol.Config.Bgp.Router.Advanced.Attribute'
          x-field-uid: 7   

        
    UpdateProtocol.Config.Bgp.Router.Advanced.Attribute:
      description: >-
        The advanced properties of a BGP router to be updated.
      type: object
      properties:
        md5_key:
          description: >-
            The MD5 authentication key to be updated on the BGP router.
            If not configured, MD5 authentication will not be enabled.
          type: string
          x-field-uid: 1
        passive_mode:
          description: >-
            If set to true, the local BGP peer will wait for the remote peer to
            initiate the BGP session by establishing the TCP connection, rather
            than initiating sessions from the local peer.
          type: boolean
          default: false
          x-field-uid: 2

    UpdateProtocol.Config.Bgp.V4RouteRange.UpdateGroup:
      description: >-
        A BGP router entry for route range-level attribute updates.
        Router-level and interface-level updates are controlled independently.
      type: object
      properties:
        names:
          description: >-
            Names of the BGP IPv4 route ranges to be updated.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Device.BgpRouter/properties/name"
          x-field-uid: 1
        
      
    UpdateProtocol.Config.Bgp.V6RouteRange.UpdateGroup:
      description: >-
        A BGP router entry for router-level attribute updates.
        Router-level and interface-level updates are controlled independently.
      type: object
      properties:
        names:
          description: >-
            The names of the BGP IPv6 route ranges to be updated.
          type: array
          items:
            type: string
          x-constraint:
          - "/components/schemas/Device.BgpRouter/properties/name"
          x-field-uid: 1