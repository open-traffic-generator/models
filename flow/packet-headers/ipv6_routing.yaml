components:
  schemas:
    Flow.Ipv6ExtHeader:
      description: IPv6 Extension header should be preceded either by IPv6 header or other
        IPv6 Extension headers and the next_header in that preceding header should be set
        to the correct value depending on the type of extension header configured. This will
        be automatically handled by implementation if next_header choice is set to auto.
        For Routing Extension header this value is 43.
      type: object
      properties:
        choice:
          type: string
          default: routing
          x-field-uid: 1
          x-enum:
            routing:
              x-field-uid: 1
        next_header:
          x-field-pattern:
            description: The next header that identifies the type of header immediately
              following this IPv6 Extension header. For TCP and UDP the values are 6 and 17 respectively.
              A value of 59 indicates that there are no further IPv6 Extension headers and that the
              payload will be appended after this header. The available defined values are listed in
              https://www.iana.org/assignments/ipv6-parameters/ipv6-parameters.xhtml#extension-header
            format: integer
            length: 8
            default: 59
            x-constants:
              tcp: 6
              udp: 17
              ipv6: 41
              ipv6_route: 43
              ipv6_frag: 44
              esp: 50
              ah: 51
              ipv6_icmp: 58
              ipv6_nonxt: 59
              ipv6_opts: 60
              mobility_header: 135
              sctp: 132
            features: [auto, count]
          x-field-uid: 2
        hdr_ext_len:
          x-field-pattern:
            description: The length of the IPv6 Extension header in 8 octet units, not including the first 8 octets
              of the Extension Header itself ( refer RFC 8200 ). When auto is assigned the implementation should
              automatically set it to the correct value.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 3
        routing:
          $ref: '#/components/schemas/Flow.Ipv6Routing'
          x-field-uid: 4
    Flow.Ipv6Routing:
      description: IPv6 routing packet headers.
      type: object
      properties:
        choice:
          type: string
          default: segment_routing
          x-field-uid: 1
          x-enum:
            segment_routing:
              x-field-uid: 1
            segment_routing_usid:
              x-field-uid: 2
        segment_routing:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting'
          x-field-uid: 2
        segment_routing_usid:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid'
          x-field-uid: 3
    Flow.Ipv6SegmentRouting:
      description: >-
        IPv6 Segment Routing Header (SRH, Routing Type 4, RFC 8754 Section 2)
        carrying full 128-bit SRv6 SIDs. Each segment list entry is a complete
        SID (locator + function + argument) as a 128-bit IPv6 address.
        Segment list encoded in reverse path order: Segment[0] is the last hop,
        Segment[n-1] is the first hop.
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: >-
              Number of route segments remaining before the packet reaches its
              final destination (RFC 8754 Section 2.1). Decremented at each
              segment endpoint. When auto is assigned the value is set to the
              number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: >-
              Zero-based index of the last element in the Segment List
              (RFC 8754 Section 2.1). For example, a list of 3 SIDs has
              Last Entry = 2. When auto is assigned the value is set to
              one less than the number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Flags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: >-
              16-bit field used to tag a packet as part of a class or group
              (RFC 8754 Section 2.1). If not used it MUST be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: >-
            List of 128-bit SRv6 SID addresses (RFC 8754 Section 2.1), encoded
            in reverse path order: Segment[0] is the last segment of the SR
            Policy, Segment[n-1] is the first segment to visit.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Segment'
          x-field-uid: 5
        pad_tlv:
          description: >-
            When present, includes a Padding TLV (type 4, RFC 8754 Section 2.1)
            in the SRH TLV section to align the TLV block to an 8-byte boundary.
            Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.PadTlv'
          x-field-uid: 6
    
    Flow.Ipv6SegmentRouting.Segment:
      description: >-
        One entry in the SRH Segment List (RFC 8754 Section 2.1).
        A single 128-bit SRv6 SID address for full-SID encoding
        (locator + function + argument packed into one IPv6 address).
      type: object
      properties:
        segment:
          x-field-pattern:
            description: >-
              A 128-bit IPv6 SID address (RFC 8754 Section 2.1).
              Example: "2001:db8::1".
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 1

    Flow.Ipv6SegmentRoutingUsid:
      description: |-
        SRH (Routing Type 4, RFC 8754 Section 2) whose segment_list entries each
        represent one 128-bit CSID container (RFC 9800 Section 4). Supports two flavors:

        NEXT-CSID (locator_length > 0, RFC 9800 Section 4.1):
          Each SRH entry is a fully formed SRv6 SID: LB (locator_length bits) || CSID-1 || ... || EoC (zeros).
          F3216 (LB=32, CSID=16): locator fc00::/32, CSIDs [0x0001, 0x0002] -> fc00:0:1:2::
          Processing: the router reads its own CSID from the DA function field, then
          left-shifts the DA by one CSID width so the next CSID moves into the active
          function position. When the shifted suffix is all-zero (End-of-Container), the
          container is exhausted: segments_left is decremented and the next SRH entry
          is loaded as the new DA.

        REPLACE-CSID (RFC 9800 Section 4.2):
          First entry (locator_length > 0): fully formed SRv6 SID, same structure as NEXT-CSID.
          Subsequent entries (locator_length = 0): K = floor(128 / LNFL) CSID slots packed
          into a 128-bit SRH entry. Provide only the non-zero CSIDs in wire order (left to
          right, MSB first among the provided values). The implementation right-aligns them
          to the LSB end and zero-pads the remaining MSB slots automatically.
          CSID width is inferred from hex string length (8 chars = 32-bit, 4 chars = 16-bit).

          Example LNFL=32, K=4, fully packed (4 CSIDs):
            usids ["00050005","00040004","00030003","00020002"]
            wire: [00050005][00040004][00030003][00020002] (MSB->LSB) -> 5:5:4:4:3:3:2:2
            DA.Arg.Index starts at K-1=3; usids[3]=00020002 is processed first.

          Example LNFL=32, K=4, partially packed (2 CSIDs, MSB slots zeroed automatically):
            usids ["00030004","00010002"]
            wire: [0][0][00030004][00010002] (MSB->LSB) -> ::3:4:1:2
            usids[1]=00010002 is at LSB and processed first by the router.

        Segment list is in reverse path order (RFC 8754 Section 2.1): segment[n-1] is the
        first active container.

        For single-container NEXT-CSID paths with no SRH, use ipv6.dst_usids instead.
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: >-
              Number of SRH segment list entries remaining to be visited after
              the current active compressed uSID container (RFC 8754 Section 2.1). 
              The active compressed uSID container is segment[segments_left]; 
              the value is decremented each time the active container is exhausted 
              and the pointer advances to the next compressed uSID container. 
              When auto is assigned the value is set to the top entry of the compressed uSID container list.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: >-
              Zero-based index of the last element in the uSID container list
              (RFC 8754 Section 2.1). When auto is assigned the value is set to
              one less than the number of containers specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.uSidFlags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: >-
              16-bit field used to tag a packet as part of a class or group
              (RFC 8754 Section 2.1). If not used it MUST be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: >-
            List of pre-computed 128-bit compressed uSID container values (RFC 9800 Section 4),
            encoded in reverse path order: Segment[0] is the last container,
            Segment[n-1] is the first container to visit.
            If Reduced SRH is needed ( RFC 8754 Section 4.1.1), the first compressed uSID container 
            is the one already in the ipv6.dst_usids and not included in this list.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRoutingUsid.Segment'
          x-field-uid: 5
        pad_tlv:
          description: >-
            When present, includes a Padding TLV (type 4, RFC 8754 Section 2.1)
            in the SRH TLV section to align the TLV block to an 8-byte boundary.
            Omit to suppress.
          $ref: '#/components/schemas/Flow.Ipv6SRH.PadTlv'
          x-field-uid: 6

    Flow.Ipv6SegmentRoutingUsid.Segment:
      description: |-
        One CSID container entry in the SRH segment list (RFC 9800, RFC 8754 Section 2.1).
        Supports both NEXT-CSID (locator_length > 0) and REPLACE-CSID packed format
        (locator_length = 0) as described in Flow.Ipv6SegmentRoutingUsid.

        NEXT-CSID example (F3216: locator_length=32, 16-bit CSIDs):
          locator fc00::/32, usids ["0001","0002","0003"] -> SRH entry fc00:0:1:2:3::

        REPLACE-CSID packed examples (LNFL=32, K=4, locator_length=0):
          Fully packed (4 CSIDs):
            usids ["00050005","00040004","00030003","00020002"]
            wire: [00050005][00040004][00030003][00020002] -> 5:5:4:4:3:3:2:2
            (usids[3]=00020002 at LSB is processed first by the router)

          Partially packed (2 CSIDs; MSB slots are zero-padded automatically):
            usids ["00030004","00010002"]
            wire: [0][0][00030004][00010002] -> ::3:4:1:2
            (usids[1]=00010002 at LSB is processed first by the router)
      type: object
      properties:
        locator:
          x-field-pattern:
            description: >-
              The Locator Block (LB) IPv6 prefix shared by all uSIDs in this
              container (RFC 9800 Section 3). Defines the common high-order bits
              of every uSID assembled from this entry. For F3216, this is a /32
              prefix (e.g., fc00::). The prefix length is given by locator_length.
              Ignored when locator_length is 0 (REPLACE-CSID flavor, RFC 9800 Section 5).
            format: ipv6
            default: ::0
            features: [count]
          x-field-uid: 1
        locator_length:
          x-field-pattern:
            description: |-
              Length of the Locator Block in bits (RFC 9800 Section 3).
              Valid range: 0-112.
              For NEXT-CSID (locator_length > 0): high-order locator_length bits of
              locator form the LB; usids are packed after it in forward order.
              For REPLACE-CSID first container (locator_length > 0): same as NEXT-CSID
              structure; use a single usid = Locator-Node+Function value (LNFL bits).
              For REPLACE-CSID packed containers (locator_length = 0): the locator
              field is ignored; the 128-bit SRH entry is K = floor(128/LNFL) slots
              of LNFL bits each; usids are provided in wire order (MSB first) - see usids
              field description for examples (RFC 9800 Section 4.2).
            format: integer
            length: 8
            default: 32
            features: [count]
          x-field-uid: 2
        usids:
          description: |-
            Ordered list of CSID hex strings for this container (RFC 9800 Section 3).
            For NEXT-CSID (locator_length > 0): CSIDs are packed in forward order after
            the Locator Block. usids[0] immediately follows the LB, usids[1] follows, etc.
            The value 0x0 (all zeros) is reserved as the End-of-Container marker.
            Example F3216: ["0001","0002","0003"] with locator fc00::/32 -> fc00:0:1:2:3::

            For REPLACE-CSID packed containers (locator_length = 0): provide only the
            non-zero CSIDs in wire order (left to right, MSB first among the provided
            values). LNFL is inferred from hex string width (8 chars = 32-bit CSID,
            K = 4; 4 chars = 16-bit CSID, K = 8). The implementation right-aligns the
            provided CSIDs to the LSB end of the 128-bit container and zero-pads the
            remaining MSB slots automatically - no need to supply leading zero entries.
            Per RFC 9800 Section 4.2, DA.Arg.Index starts at the last occupied slot
            (LSB = usids[-1]) and decrements each hop, so usids[-1] is the first CSID
            the router processes and usids[0] is the last.

            Example LNFL=32, K=4, fully packed (4 CSIDs):
              usids ["00050005","00040004","00030003","00020002"]
              wire: [00050005][00040004][00030003][00020002] (MSB->LSB) -> 5:5:4:4:3:3:2:2
              Router processes: 00020002 first, then 00030003, 00040004, 00050005.

            Example LNFL=32, K=4, partially packed (2 CSIDs; MSB slots zeroed automatically):
              usids ["00030004","00010002"]
              wire: [0][0][00030004][00010002] (MSB->LSB) -> ::3:4:1:2
              Router processes: 00010002 first, then 00030004.
          type: array
          minItems: 1
          items:
            type: string
            format: hex
          x-field-uid: 3

    Flow.Ipv6SegmentRouting.uSidFlags:
      description: >-
        SRH Flags field (RFC 8754 Section 2.1). An 8-bit field; RFC 8754
        marks all bits as reserved.
      type: object
      properties:
        oam:
          x-field-pattern:
            description: (RFC 9259, section 2) OAM flag or O-flag is set at bit-2. Indicates if the packet is an Operations, Administration,
              and Maintenance (OAM) packet.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_oam: 0
              oam: 1
            features:
              - count
          x-field-uid: 1
    
    Flow.Ipv6SegmentRouting.Flags:
      description: An 8-bit field containing flags. While RFC 8754 reserves all
        bits as unused, earlier drafts defined specific flags for behavior such
        as OAM, HMAC, and FRR protection.
      type: object
      properties:
        protected:
          x-field-pattern:
            description: Protected Flag. Indicates if the segment is protected
              by a Fast Re-Route (FRR) mechanism.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_protected: 0
              protected: 1
            features:
              - count
          x-field-uid: 1
        oam:
          x-field-pattern:
            description: (RFC 9259, section 2) OAM flag or O-flag is set at bit-2. Indicates if the packet is an Operations, Administration,
              and Maintenance (OAM) packet.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_oam: 0
              oam: 1
            features:
              - count
          x-field-uid: 2
        alert:
          x-field-pattern:
            description: Alert Flag. Indicates the presence of important TLVs
              that must be inspected.
            format: integer
            length: 1
            default: 0
            x-constants:
              no_alert: 0
              alert: 1
            features:
              - count
          x-field-uid: 3

    Flow.Ipv6SRH.PadTlv:
      description: >-
        SRH Padding TLV (type 4, RFC 8754 Section 2.1). Used to align the
        SRH TLV block to an 8-byte boundary. The padding bytes are set to zero
        and are skipped by transit nodes. When present this TLV is included in
        the SRH TLV section; omit the object to suppress it.
        Reference: RFC 8754 Section 2.1.
      type: object
      properties:
        type:
          x-field-pattern:
            description: >-
              TLV type code (RFC 8754 Section 2.1). The canonical value is 4.
              Set to a different value only for negative or conformance testing.
            format: integer
            length: 8
            default: 4
            features: [auto, count]
          x-field-uid: 1
        length:
          x-field-pattern:
            description: >-
              Number of padding bytes following the Type and Length fields
              (RFC 8754 Section 2.1). When auto is assigned the implementation
              computes the value needed to align the TLV section to an
              8-byte boundary.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
      