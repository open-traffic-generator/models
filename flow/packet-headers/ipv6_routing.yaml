components:
  schemas:
    Flow.Ipv6ExtHeader:
      description: IPv6 Extension header should be preceded either by IPv6 header or other
        IPv6 Extension headers and the next_header in that preceding header should be set
        to the correct value depending on the type of extension header configured. This will
        be automatically handled by implementation if next_header choice is set to auto.
        For Routing Extension header this value is 43.
      type: object
      properties:
        choice:
          type: string
          default: routing
          x-field-uid: 1
          x-enum:
            routing:
              x-field-uid: 1
        next_header:
          x-field-pattern:
            description: The next header that identifies the type of header immediately
              following this IPv6 Extension header. For TCP and UDP the values are 6 and 17 respectively.
              A value of 59 indicates that there are no further IPv6 Extension headers and that the
              payload will be appended after this header. The available defined values are listed in
              https://www.iana.org/assignments/ipv6-parameters/ipv6-parameters.xhtml#extension-header
            format: integer
            length: 8
            default: 59
            x-constants:
              tcp: 6
              udp: 17
              ipv6: 41
              ipv6_route: 43
              ipv6_frag: 44
              esp: 50
              ah: 51
              ipv6_icmp: 58
              ipv6_nonxt: 59
              ipv6_opts: 60
              mobility_header: 135
              sctp: 132
            features: [auto, count]
          x-field-uid: 2
        hdr_ext_len:
          x-field-pattern:
            description: The length of the IPv6 Extension header in 8 octet units, not including the first 8 octets
              of the Extension Header itself ( refer RFC 8200 ). When auto is assigned the implementation should
              automatically set it to the correct value.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 3
        routing:
          $ref: '#/components/schemas/Flow.Ipv6Routing'
          x-field-uid: 4
    Flow.Ipv6Routing:
      description: IPv6 routing packet headers.
      type: object
      properties:
        choice:
          type: string
          default: segment_routing
          x-field-uid: 1
          x-enum:
            segment_routing:
              x-field-uid: 1
        segment_routing:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting'
          x-field-uid: 2
    Flow.Ipv6SegmentRouting:
      description: Defines the structure of the IPv6 Segment Routing Header (SRH)
        with Routing Type 4. This header is an IPv6 Routing header used to specify
        a source-routed path for a packet, guiding it through a sequence of Segment
        IDs (SIDs), which are typically IPv6 addresses.
      type: object
      properties:
        segments_left:
          x-field-pattern:
            description: 8-bit unsigned integer containing the number of remaining
              segments to be visited before the packet reaches its final destination.
              It is decremented at each segment endpoint. It points to the current
              active segment in the Segment List. This should not be more than the
              number of segments specified in the segment list. When auto is assigned 
              the value is set to the number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 1
        last_entry:
          x-field-pattern:
            description: 8-bit unsigned integer that contains the zero-based index
              of the last element in the Segment List array. For example, if the Segment
              List contains 3 addresses (at indices 0, 1, 2), the value of Last Entry
              is 2. When auto is assigned the value should be automatically set by the
              implementation to one less than the number of segments specified.
            format: integer
            length: 8
            default: 0
            features: [auto, count]
          x-field-uid: 2
        flags:
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Flags'
          x-field-uid: 3
        tag:
          x-field-pattern:
            description: 16-bit field used to tag a packet as part of a class or group,
              enabling shared properties or policy treatment. If not used, it MUST
              be set to zero.
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 4
        segment_list:
          description: 128-bit IPv6 addresses representing the nth segment in the
            Segment List. The Segment List is encoded starting from the last segment
            of the SR Policy. That is, the first element of the Segment List (Segment List[0])
            contains the last segment of the SR Policy, the second element contains
            the penultimate segment of the SR Policy, and so on.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.Segment'
          x-field-uid: 5
        routing_type:
          x-field-pattern:
            description: >-
              8-bit Routing Type field in the SRH (RFC 8754 Section 2.1).
              The only defined value for Segment Routing is 4. When auto is
              assigned the implementation sets this to 4 automatically.
            format: integer
            length: 8
            default: 4
            features: [auto, count]
          x-field-uid: 6
        srv6_encap_mode:
          description: >-
            Declares the SRv6 encapsulation variant for this flow (RFC 9800 Section 4,
            RFC 8986 Section 4.16). The implementation uses this to validate the
            surrounding packet stack.
            'srh' (default) - standard SRH with full segment list.
              Stack: Ethernet + IPv6 + IPv6ExtHeader(routing) + payload.
            'usid_no_srh' - active uSID is placed directly in the outer IPv6 DA;
              no Segment Routing Header is generated. This exercises the uN
              reduced-SRH forwarding path.
              Stack: Ethernet + IPv6 (DA=active_usid) + payload.
            'usid_srh_1' - outer IPv6 + one uSID container in SRH (segments_left=0).
              Stack: Ethernet + IPv6 + IPv6ExtHeader(routing, 1 segment) + payload.
            'usid_srh_2' - outer IPv6 + two uSID containers in SRH (segments_left=1).
              Stack: Ethernet + IPv6 + IPv6ExtHeader(routing, 2 segments) + payload.
            For USD decapsulation tests, the payload layer is IPv4 (IPinIPv6) or
            IPv6 (IPv6inIPv6) rather than the application payload.
          type: string
          default: srh
          x-enum:
            srh:
              x-field-uid: 1
            usid_no_srh:
              x-field-uid: 2
            usid_srh_1:
              x-field-uid: 3
            usid_srh_2:
              x-field-uid: 4
          x-field-uid: 7
    Flow.Ipv6SegmentRouting.Segment:
      description: >-
        One entry in the SRH Segment List (RFC 8754 Section 2.1).
        Two encodings are supported:
        'segment' - a single 128-bit SRv6 SID address (full-SID encoding, default).
        'usid_container' - a packed 128-bit uSID container holding multiple
        micro-SIDs per RFC 9800. Set 'usid_container' to provide structured input;
        leave it unset and use 'segment' for standard full-SID entries.
      type: object
      properties:
        segment:
          x-field-pattern:
            description: >-
              A 128-bit IPv6 SID address (RFC 8754 Section 2.1).
              Use for standard full-SID encoding where each segment carries
              a complete locator + function + argument value.
              Example: "2001:db8::1".
            format: ipv6
            default: ::0
            features:
              - count
          x-field-uid: 1
        usid_container:
          description: >-
            Structured uSID container encoding (RFC 9800). When set, the
            implementation assembles the 128-bit container value from the
            constituent uSIDs and places it in the SRH segment list entry.
            Takes precedence over 'segment' if both are provided.
          $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.USidContainer'
          x-field-uid: 2
    Flow.Ipv6SegmentRouting.Flags:
      description: An 8-bit field containing flags. While RFC 8754 reserves all
        bits as unused, earlier drafts defined specific flags for behavior such
        as OAM, HMAC, and FRR protection.
      type: object
      properties:
        protected:
          x-field-pattern:
            description: Protected Flag. Indicates if the segment is protected
              by a Fast Re-Route (FRR) mechanism.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_protected: 0
              protected: 1
            features:
              - count
          x-field-uid: 1
        oam:
          x-field-pattern:
            description: OAM Flag. Indicates if the packet is an Operations, Administration,
              and Maintenance (OAM) packet.
            format: integer
            length: 1
            default: 0
            x-constants:
              not_oam: 0
              oam: 1
            features:
              - count
          x-field-uid: 2
        alert:
          x-field-pattern:
            description: Alert Flag. Indicates the presence of important TLVs
              that must be inspected.
            format: integer
            length: 1
            default: 0
            x-constants:
              no_alert: 0
              alert: 1
            features:
              - count
          x-field-uid: 3
    Flow.Ipv6SegmentRouting.USidContainer:
      description: >-
        A uSID container segment (RFC 9800) - a 128-bit IPv6 address packed
        with multiple Micro-SIDs (uSIDs). The implementation assembles the
        128-bit value by placing the locator block prefix in the high bits,
        then packing each uSID (locator_node + function) consecutively in
        units of (locator_node_length + function_length) bits, padding the
        remainder with zeros.
        Example using F3216 (lb=32, ln=16, fn=16, arg=0) and locator block
        fc00::/32:
          usids = [{node: "0001", function: "0001"}, {node: "0002", function: "0001"}]
          => container = fc00:0:1:1:2:1:: (2-hop path, nodes 1 and 2, function 1)
        Reference: RFC 9800 Section 4.
      type: object
      required: [locator_block]
      properties:
        locator_block:
          description: >-
            The common locator block IPv6 prefix shared across all uSIDs in
            this container (e.g., "fc00::" for the fcbb:bbbb::/32 SONiC
            convention). This prefix occupies the most-significant
            locator_block_length bits of the 128-bit container.
          type: string
          format: ipv6
          x-field-uid: 1
        locator_block_length:
          description: >-
            Length of the locator block in bits (default 32 for F3216 uSID
            format). Must match the lb_length in the IsisSRv6.SidStructure
            used by the emulated devices.
          type: integer
          format: uint32
          minimum: 1
          maximum: 120
          default: 32
          x-field-uid: 2
        locator_node_length:
          description: >-
            Length of the locator node field within each uSID slot, in bits
            (default 16 for F3216). Each uSID slot is
            (locator_node_length + function_length) bits wide.
          type: integer
          format: uint32
          minimum: 0
          maximum: 64
          default: 16
          x-field-uid: 3
        function_length:
          description: >-
            Length of the function field within each uSID slot, in bits
            (default 16 for F3216).
          type: integer
          format: uint32
          minimum: 0
          maximum: 64
          default: 16
          x-field-uid: 4
        usids:
          description: >-
            Ordered list of uSIDs to pack into this container, from
            left (most significant) to right. Each uSID entry provides
            the locator_node and function hex values; the implementation
            packs them consecutively after the locator block.
            The number of uSIDs that fit in one container is:
              floor((128 - locator_block_length) /
                    (locator_node_length + function_length))
            For F3216: floor((128-32)/(16+16)) = 3 uSIDs per container.
          type: array
          items:
            $ref: '#/components/schemas/Flow.Ipv6SegmentRouting.USid'
          x-field-uid: 5
    Flow.Ipv6SegmentRouting.USid:
      description: >-
        One Micro-SID (uSID) entry within a uSID container (RFC 9800).
        Specifies the locator node and function hex values that are packed
        into consecutive bits of the 128-bit container value.
      type: object
      properties:
        locator_node:
          description: >-
            Locator node identifier as a hex string, occupying
            locator_node_length bits in the container. For F3216
            (locator_node_length=16), this is a 4-nibble string.
            Example: "0001" identifies node 1.
          type: string
          format: hex
          x-field-uid: 1
        function:
          description: >-
            Function identifier as a hex string, occupying function_length
            bits in the container. For F3216 (function_length=16), this is
            a 4-nibble string. Example: "0001" for End, "00c8" for End.X.
          type: string
          format: hex
          x-field-uid: 2
