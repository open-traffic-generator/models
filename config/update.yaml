components:
  schemas:
    Config.Update:
      description: >-
        Request for updating specific attributes of resources in traffic generator
      type: object
      properties:
        choice:
          type: string
          x-enum:
            flows:
              x-field-uid: 1
            protocols:
              x-field-uid: 2
          x-field-uid: 1
        flows:
          $ref: '#/components/schemas/Flows.Update'
          x-field-uid: 2
        protocols:
          $ref: '#/components/schemas/Protocols.Update'
          x-field-uid: 3

    Flows.Update:
      description: >-
        A container of flows with associated properties to be updated without
        affecting the flows current transmit state.
      type: object
      required:
        - property_names
        - flows
      properties:
        property_names:
          description: >-
            Flow properties to be updated without affecting the transmit state.
          type: array
          items:
            type: string
            x-enum:
              rate:
                x-field-uid: 1
              size:
                x-field-uid: 2
          x-field-uid: 1
        flows:
          description: >-
            The list of configured flows for which given property will be updated.
          type: array
          items:
            $ref: '#/components/schemas/Flow'
          x-field-uid: 2
          
    Protocols.Update:
      description: |-
        A container of Protocols with associated properties to be updated that may or may not
        able to maintain the current Protocols session in Up state always.
        If the session is up but true on-the-fly update is not supported for one of the attributes selected for update
        (e.g. metric change on an emulated interface): a warning should be returned indicating that the session will be 
        disabled and re-enabled,and the updated attribute(s) will be reflected once the session comes back up.
          a) The attributes are permanently updated in the stored config [i.e. next get_config should return modified parameters]
          b) If any of the protocol session(s) linked to the attributes is not in started state, an implementation return with
              Error rejecting the full update request OR will be applied on next start of the protocol.
          c) If session tied to an attribute is not in started state , the change will be reflected when session comes up next.   
      type: object
      properties:
        isis:
          $ref: './updateisisconfig.yaml#/components/schemas/UpdateProtocol.Config.Isis'
          x-field-uid: 1