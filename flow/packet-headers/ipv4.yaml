components:
  schemas:
    Flow.Ipv4:
      description: IPv4 packet header
      type: object
      properties:
        version:
          x-field-pattern:
            description: >-
              Version
            format: integer
            length: 4
            default: 4
            features: [count, metric_tags]
          x-field-uid: 1
        header_length:
          x-field-pattern:
            description: >-
              Header length
            format: integer
            default: 5
            length: 4
            features: [auto, count, metric_tags]
          x-field-uid: 2
        priority:
          $ref: '#/components/schemas/Flow.Ipv4.Priority'
          x-field-uid: 3
        total_length:
          x-field-pattern:
            description: >-
              Total length
            format: integer
            default: 46
            length: 16
            features: [auto, count, metric_tags]
          x-field-uid: 4
        identification:
          x-field-pattern:
            description: >-
              Identification
            format: integer
            length: 16
            default: 0
            features: [count, metric_tags]
          x-field-uid: 5
        reserved:
          x-field-pattern:
            description: >-
              Reserved flag.
            format: integer
            length: 1
            default: 0
            features: [count, metric_tags]
          x-field-uid: 6
        dont_fragment:
          x-field-pattern:
            description: >-
              Dont fragment flag
              If the dont_fragment flag is set and fragmentation is required to
              route the packet then the packet is dropped.
            format: integer
            length: 1
            default: 0
            features: [count, metric_tags]
          x-field-uid: 7
        more_fragments:
          x-field-pattern:
            description: >-
              More fragments flag
            format: integer
            length: 1
            default: 0
            features: [count, metric_tags]
          x-field-uid: 8
        fragment_offset:
          x-field-pattern:
            description: >-
              Fragment offset
            format: integer
            length: 5
            default: 0
            features: [count, metric_tags]
          x-field-uid: 9
        time_to_live:
          x-field-pattern:
            description: >-
              Time to live
            format: integer
            length: 8
            default: 64
            features: [count, metric_tags]
          x-field-uid: 10
        protocol:
          x-field-pattern:
            description: >-
              Protocol, default is 61 any host internal protocol
            format: integer
            length: 8
            default: 61
            features: [auto, count, metric_tags]
          x-field-uid: 11
        header_checksum:
          x-field-pattern:
            description: >-
              Header checksum
            format: checksum
            length: 16
          x-field-uid: 12
        src:
          x-field-pattern:
            description: >-
              Source address
            format: ipv4
            default: 0.0.0.0
            features: [count, metric_tags, auto, random]
            auto:
              $ref: '#/components/schemas/Flow.Ipv4.Auto'
              default: false
          x-field-uid: 13
        dst:
          x-field-pattern:
            description: >-
              Destination address
            format: ipv4
            default: 0.0.0.0
            features: [count, metric_tags, auto, random]
            auto:
              $ref: '#/components/schemas/Flow.Ipv4.Auto'
              default: false
          x-field-uid: 14
        options:
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/Flow.Ipv4.Options'
          x-field-uid: 15
    Flow.Ipv4.Options:
      description: >-
        IPv4 options are optional extensions for the IPv4 header that can be utilised to provide additional information about the IPv4 datagram. 
        It is encoded as a series of type, length and value attributes. 
        The IP header length MUST be increased to accommodate the extra bytes needed to encode the IP options.
        The length of the all options included to a IPv4 header should not exceed 40 bytes since IPv4 Header length (4 bits) can at max specify 15 4-word octets for a total of 60 bytes which includes 20 bytes needed for mandatory attributes of the IPv4 header.
        If the user adds multiples IPv4 options that exceeds 40 bytes and specify header length as "auto", implementation should throw error.
        Currently IP options supported are:
        1. router_alert option allows devices to intercept packets not addressed to them directly as defined in RFC2113.
        2. custom option is provided to configure user defined IP options as needed.
        3. timestamp option allows routers to record their local timestamp and IP address for latency measurement and path diagnostics as defined in RFC791. 
        4. end_of_options option allows routers to specify the end of options list. This may only be used if the end of the options does not coincide with the end
        of the IP header. It is a single octet value and padding is implicitly added to conform to a work boundary.
      type: object
      properties:
        choice:
          type: string
          default: router_alert
          x-field-uid: 1
          x-enum:
            router_alert:
              x-field-uid: 1
            custom:
              x-field-uid: 2
            timestamp:
              x-field-uid: 3
            end_of_options:
              x-field-uid: 4
        custom:
          $ref: '#/components/schemas/Flow.Ipv4Options.Custom'
          x-field-uid: 2
        timestamp:
          $ref: '#/components/schemas/Flow.Ipv4Options.Timestamp'
          x-field-uid: 3
    Flow.Ipv4Options.Custom:
      description: >-
        User defined IP options to be appended to the IPv4 header.
      type: object
      properties:
        type:
          $ref: '#/components/schemas/Flow.Ipv4Options.Custom.Type'
          x-field-uid: 1
        length:
          $ref: '#/components/schemas/Flow.Ipv4Options.Custom.Length'
          x-field-uid: 2
        value:
          description: >-
            Value of the option field should not excced 38 bytes since maximum 40 bytes can be added as options in IPv4 header.
            For type and length requires 2 bytes, hence maximum of 38 bytes are expected.
            Maximum length of this attribute is 76 (38 * 2 hex character per byte).
          type: string
          format: hex
          minLength: 0
          maxLength: 76
          default: '0000'
          x-field-uid: 3
    Flow.Ipv4Options.Custom.Type:
      description: >-
        Type options for custom options.
      type: object
      properties:
        copied_flag:
          x-field-pattern:
            x-constants:
              not_copied: 0
              copied: 1
            description: >-
              This flag indicates this option is copied to all fragments on fragmentations.
            format: integer
            length: 1
            default: 0
            features: [count]
          x-field-uid: 1
        option_class:
          x-field-pattern:
            x-constants:
              control: 0
              reserved: 1
              debugging_measurement: 2
              reserved: 3
            description: >-
              Option class [Ref:https://www.iana.org/assignments/ip-parameters/ip-parameters.xhtml#ip-parameters-1].
            format: integer
            length: 2
            default: 0
            features: [count]
          x-field-uid: 2
        option_number:
          x-field-pattern:
            description: >-
              Option Number [Ref:https://www.iana.org/assignments/ip-parameters/ip-parameters.xhtml#ip-parameters-1].
            format: integer
            length: 5
            default: 0
            features: [count]
          x-field-uid: 3
    Flow.Ipv4Options.Custom.Length:
      description: >-
        Length for custom options.
      type: object
      properties:
        choice:
          description: auto or configured value.
          type: string
          default: auto
          x-field-uid: 1
          x-enum:
            auto:
              x-field-uid: 1
            value:
              x-field-uid: 2
        auto:
          description: >-
            The OTG implementation can provide a system generated value for this property.
            If the OTG is unable to generate a value the default value must be used.
          type: integer
          format: uint32
          default: 0
          x-field-uid: 2
        value:
          type: integer
          format: uint32
          default: 0
          x-field-uid: 3
    Flow.Ipv4Options.Timestamp:
      description: |-
        IPv4 timestamp option to be appended to the IPv4 header.
      type: object
      properties:
        pointer:
          $ref: '#/components/schemas/Flow.Ipv4Options.Timestamp.Pointer'
          x-field-uid: 1
        overflow:
          description: |-
              A counter that indicates the number of intermediate nodes that were unable to record a timestamp because the options data area was full.
          x-field-pattern:
            format: integer
            length: 4
            default: 0
            features: [count]
          x-field-uid: 2
        format:
          $ref: '#/components/schemas/Flow.Ipv4Options.Timestamp.Format'
          x-field-uid: 3
    Flow.Ipv4Options.Timestamp.Pointer:
      description: |-
        The attribute pointer indicates the octet offset where the next router should begin recording its data.
        Choices of input are,
        1. auto : The OTG implementation can provide a system generated value for this property. If the implementation is unable to generate a value, the default value must be used.
        2. value: User can configure the pointer value.
      type: object
      properties:
        choice:
          type: string
          default: auto
          x-field-uid: 1
          x-enum:
            auto:
              x-field-uid: 1
            value:
              x-field-uid: 2
        value:
          type: integer
          format: uint32
          default: 5
          minimum: 5
          maximum: 40
          x-field-uid: 2
    Flow.Ipv4Options.Timestamp.Format:
      description: |-
        The format field defines the structural layout of the options data area and the specific recording logic routers must follow when appending timestamps and IP addresses.
      type: object
      properties:
        choice:
          type: string
          x-enum:
            timestamps:
              x-field-uid: 1
            address_and_timestamps:
              x-field-uid: 2
            prespecified_address_and_timestamps:
              x-field-uid: 3
          x-field-uid: 1
        timestamps:
          description: |-
            A recording mode where routers append only their 32-bit universal timestamps sequentially into the options data area.
          type: array
          items:
            $ref: '#/components/schemas/Flow.Ipv4Options.Timestamp.Format.Timestamp'
          x-field-uid: 2
        address_and_timestamps:
          description: |-
            A recording mode where each router appends its 32-bit IPv4 address followed immediately by its 32-bit universal timestamp into the options data area.
          type: array
          items:
            $ref: '#/components/schemas/Flow.Ipv4Options.Timestamp.Format.AddressAndTimestamp'
          x-field-uid: 3
        prespecified_address_and_timestamps:
          description: |-
            A selective recording mode where only routers whose IPv4 addresses match the pre-listed entries in the header record their 32-bit universal timestamps into the options data area.
          type: array
          items:
            $ref: '#/components/schemas/Flow.Ipv4Options.Timestamp.Format.AddressAndTimestamp'
          x-field-uid: 4
    Flow.Ipv4Options.Timestamp.Format.Timestamp:
      type: object
      properties:
        timestamp:
          x-field-pattern:
            description: |-
              A 32-bit value representing the time of packet processing, recorded as the number of milliseconds elapsed since midnight Universal Time (UT).
            format: integer
            length: 32
            default: 0
            features: [count]
          x-field-uid: 1
    Flow.Ipv4Options.Timestamp.Format.AddressAndTimestamp:
      type: object
      properties:
        address:
          x-field-pattern:
            description: |-
              IPv4 address of the router interface that handled the packet, serving as a network identifier for the corresponding timestamp entry.
            format: ipv4
            default: 0.0.0.0
            features: [count]
          x-field-uid: 1
        timestamp:
          x-field-pattern:
            description: |-
              A 32-bit value representing the time of packet processing, recorded as the number of milliseconds elapsed since midnight Universal Time (UT).
            format: integer
            length: 32
            default: 0
            features: [count]
          x-field-uid: 2
    Flow.Ipv4.Priority:
      description: >-
        A container for ipv4 raw, tos, dscp ip priorities.
      type: object
      properties:
        choice:
          type: string
          default: dscp
          x-field-uid: 1
          x-enum:
            raw:
              x-field-uid: 1
            tos:
              x-field-uid: 2
            dscp:
              x-field-uid: 3
        raw:
          x-field-pattern:
            description: >-
              Raw priority
            format: integer
            length: 8
            default: 0
            features: [count, metric_tags]
          x-field-uid: 2
        tos:
          $ref: '#/components/schemas/Flow.Ipv4.Tos'
          x-field-uid: 3
        dscp:
          $ref: '#/components/schemas/Flow.Ipv4.Dscp'
          x-field-uid: 4
    Flow.Ipv4.Dscp:
      description: >-
        Differentiated services code point (DSCP) packet field.
      type: object
      properties:
        phb:
          x-field-pattern:
            x-constants:
              default: 0
              cs1: 8
              cs2: 16
              cs3: 24
              cs4: 32
              cs5: 40
              cs6: 48
              cs7: 56
              af11: 10
              af12: 12
              af13: 14
              af21: 18
              af22: 20
              af23: 22
              af31: 26
              af32: 28
              af33: 30
              af41: 34
              af42: 36
              af43: 38
              ef46: 46
            description: >-
              Per hop behavior
            format: integer
            length: 6
            default: 0
            features: [count, metric_tags]
          x-field-uid: 1
        ecn:
          x-field-pattern:
            x-constants:
              non_capable: 0
              capable_transport_0: 1
              capable_transport_1: 2
              congestion_encountered: 3
            description: >-
              Explicit congestion notification
            format: integer
            length: 2
            default: 0
            features: [count, metric_tags]
          x-field-uid: 2
    Flow.Ipv4.Tos:
      description: >-
        Type of service (TOS) packet field.
      type: object
      properties:
        precedence:
          x-field-pattern:
            x-constants:
              routine: 0
              priority: 1
              immediate: 2
              flash: 3
              flash_override: 4
              critic_ecp: 5
              internetwork_control: 6
              network_control: 7
            description: >-
              Precedence
            format: integer
            length: 3
            default: 0
            features: [count, metric_tags]
          x-field-uid: 1
        delay:
          x-field-pattern:
            x-constants:
              normal: 0
              low: 1
            description: >-
              Delay
            format: integer
            length: 1
            default: 0
            features: [count, metric_tags]
          x-field-uid: 2
        throughput:
          x-field-pattern:
            x-constants:
              normal: 0
              low: 1
            description: >-
              Throughput
            format: integer
            length: 1
            default: 0
            features: [count, metric_tags]
          x-field-uid: 3
        reliability:
          x-field-pattern:
            x-constants:
              normal: 0
              low: 1
            description: >-
              Reliability
            format: integer
            length: 1
            default: 0
            features: [count, metric_tags]
          x-field-uid: 4
        monetary:
          x-field-pattern:
            x-constants:
              normal: 0
              low: 1
            description: >-
              Monetary
            format: integer
            length: 1
            default: 0
            features: [count, metric_tags]
          x-field-uid: 5
        unused:
          x-field-pattern:
            description: >-
              Unused
            format: integer
            length: 1
            default: 0
            features: [count, metric_tags]
          x-field-uid: 6
    Flow.Ipv4.Auto:
      description: |-
        The OTG implementation can provide a system generated, value for this property.
      type: object
      required: [choice]
      properties:
        choice:
          description: |- 
            The method to be used to provide the system generated value.
            
            The dhcp option populates the field based on the dynamic IPv4 address that has been assigned to the DHCPv4 client by a DHCPv4 server.
          type: string
          x-enum:
            dhcp:
              x-field-uid: 1
          x-field-uid: 1