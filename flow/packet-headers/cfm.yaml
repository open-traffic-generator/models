components:
  schemas:
    Flow.Cfm:
      description: Defines the fields of a Connectivity Fault Management (CFM)
        Packet Data Unit (PDU) as specified by IEEE 802.1.
      type: object
      properties:
        common_header:
          $ref: '#/components/schemas/Flow.Cfm.CommonHdr'
          x-field-uid: 1
        select_packet_header:
          $ref: '#/components/schemas/Flow.Cfm.SelectPktHdr'
          x-field-uid: 2
        tlvs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Cfm.Tlvs'
          x-field-uid: 3
    Flow.Cfm.CommonHdr:
      description: Defines the CFM message header.
      type: object
      properties:
        md_level:
          x-field-pattern:
            description: >-
              Maintenance Domain Level
            format: integer
            length: 3
            default: 0
            features:
              - count
          x-field-uid: 1
        version:
          x-field-pattern:
            description: >-
              Indicates the version as specified in 8021Q
            format: integer
            length: 5
            default: 0
            features:
              - count
          x-field-uid: 2
        op_code:
          x-field-pattern:
            description: >-
              Specifies the operation performed by the message. The following 
              TRILL-specific CFM OpCodes are defined. Each of the OpCodes
              indicates a separate type of TRILL OAM message.
                1: Continuity Check Message (CCM)
                2: Loopback Reply (LBR)
                3" Loopback Message (LBM)
                4: Linktrace Reply (LTR)
                5: Linktrace Message (LTM)
                32: Generic Notification Message (GNM)
                33: Alarm Indication Signal (AIS)
                35: Locked Signal (LCK)
                37: Test Signal (TST)
                39: Automatic Protection Switching_Linear (APS)
                40: Automatic Protection Switching_Ring (APS)
                42: Loss Measurement Reply (LMR)
                43: Loss Measurement Message (LMM)
                46: Delay Measurement Reply (DMR)
                47: Delay Measurement Message (DMM)
            format: integer
            length: 8
            default: 1
            features:
              - count
          x-field-uid: 3
        flags:
          x-field-pattern:
            description: >-
              Defines operational flags and is OpCode-specific.
            format: integer
            length: 8
            default: 0
            features:
              - count
          x-field-uid: 4
        first_tlv_offset:
          x-field-pattern:
            description: >-
              Defines the location of the first TLV, in bytes, starting from 
              the end of the FirstTLVOffset field (1 byte).
            format: integer
            length: 8
            default: 70
            features:
              - count
          x-field-uid: 5
    Flow.Cfm.SelectPktHdr:
      description: Select message header. Currently only Continuity Check Message 
        (CCM) is supported.
      type: object
      properties:
        choice:
          type: string
          default: ccm
          x-field-uid: 1
          x-enum:
            ccm:
              x-field-uid: 1
        ccm:
          $ref: '#/components/schemas/Flow.Cfm.Ccm'
          x-field-uid: 2
    Flow.Cfm.Ccm:
      description: CCM is used to monitor connectivity and configuration errors.
        Each CCM message has a unique sequence number (Session ID) and unique 
        flow-identifier.
      type: object
      properties:
        sequence_number:
          x-field-pattern:
            description: >-
              CCM unique sequence number
            format: integer
            length: 32
            default: 0
            features:
              - count
          x-field-uid: 1
        ma_endpoint_identifier:
          x-field-pattern:
            description: >-
              Maintenance association endPoint identifier
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 2
        ethernet_oam_type:
          $ref: '#/components/schemas/Flow.Cfm.OamType'
          x-field-uid: 3
    Flow.Cfm.OamType:
      description: Ethernet OAM standard. Currently only Connectivity Fault Management
        (CFM) is supported.
      type: object
      properties:
        choice:
            type: string
            default: cfm
            x-field-uid: 1
            x-enum:
              cfm:
                x-field-uid: 1
        cfm:
          $ref: '#/components/schemas/Flow.Cfm.Cfm'
          x-field-uid: 2
    Flow.Cfm.Cfm:
      description: Connectivity Fault Management
      type: object
      properties:
        choice:
            type: string
            default: maid_present
            x-field-uid: 1
            x-enum:
              maid_present:
                x-field-uid: 1
        maid_present:
          $ref: '#/components/schemas/Flow.Cfm.MAIDPresent'
          x-field-uid: 2
    Flow.Cfm.MAIDPresent:
      description: Maintenance association endPoint identifier
      type: object
      properties:
        md_name_format:
          x-field-pattern:
            description: >-
              Maintenance domain name format
            format: integer
            length: 8
            default: 4
            features:
              - count
          x-field-uid: 1
        md_name_length:
          x-field-pattern:
            description: >-
              Maintenance domain name format
            format: integer
            length: 8
            default: 1
            features:
              - count
          x-field-uid: 2
        md_name:
          description: >-
            Maintenance domain name format
          type: string
          format: hex
          default: '00'
          x-field-uid: 3
    Flow.Cfm.Tlvs:
      description: The CFM TLV format is defined in 8021Q. Common fields are
        Type (1 octet) defined by choice below, Length (2 octet) and Value (variable)
        defined for each tlv type.
      type: object
      properties:
        choice:
          type: string
          default: end
          x-field-uid: 1
          x-enum:
            end:
              x-field-uid: 1
            port_status:
              x-field-uid: 2
            interface_status:
              x-field-uid: 3
        length:
          x-field-pattern:
            description: Specifies the length of the tlv data in octets.
            format: integer
            length: 16
            default: 0
            features: [auto, count]
          x-field-uid: 2
        port_status:
          $ref: '#/components/schemas/Flow.Cfm.PortStatusTlv'
          x-field-uid: 3
        interface_status:
          $ref: '#/components/schemas/Flow.Cfm.InterfaceStatusTlv'
          x-field-uid: 4
    Flow.Cfm.PortStatusTlv:
      description: Port status
      type: object
      properties:
        status:
          description: Port status can be either port blocked or port up
          type: string
          default: port_up
          x-enum:
            port_blocked:
              x-field-uid: 1
            port_up:
              x-field-uid: 2
          x-field-uid: 1
    Flow.Cfm.InterfaceStatusTlv:
      description: Interface status
      type: object
      properties:
        status:
          description: Defined interface status
          type: string
          default: up
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
            testing:
              x-field-uid: 3
            unknown:
              x-field-uid: 4
            dormant:
              x-field-uid: 5
            not_present:
              x-field-uid: 6
            lower_layer_down:
              x-field-uid: 7
          x-field-uid: 1