components:
  schemas:
    Flow.Cfm:
      description: Defines the fields of a Connectivity Fault Management (CFM)
        Packet Data Unit (PDU) as specified by IEEE 802.1.
      type: object
      properties:
        md_level:
          x-field-pattern:
            description: >-
              Maintenance Domain Level
            format: integer
            length: 3
            default: 0
            features:
              - count
          x-field-uid: 1
        version:
          x-field-pattern:
            description: >-
              Indicates the version as specified in 8021Q
            format: integer
            length: 5
            default: 0
            features:
              - count
          x-field-uid: 2
        op_code:
          $ref: '#/components/schemas/Flow.Cfm.SelectOpCode'
          x-field-uid: 3
    Flow.Cfm.SelectOpCode:
      description: Select message header. Currently only Continuity Check Message 
        (CCM), Loopback Message (LBM) and Loopback Reply (LBR) are supported.
      type: object
      properties:
        choice:
          type: string
          default: ccm
          x-field-uid: 1
          x-enum:
            ccm:
              x-field-uid: 1
            lbm:
              x-field-uid: 2
            lbr:
              x-field-uid: 3
        ccm:
          $ref: '#/components/schemas/Flow.Cfm.Ccm'
          x-field-uid: 2
        lbm:
          $ref: '#/components/schemas/Flow.Cfm.Lbm'
          x-field-uid: 3
        lbr:
          $ref: '#/components/schemas/Flow.Cfm.Lbr'
          x-field-uid: 4
    Flow.Cfm.Ccm:
      description: CCM is used to monitor connectivity and configuration errors.
        Each CCM message has a unique sequence number (Session ID) and unique 
        flow-identifier.
      type: object
      properties:
        flags:
          $ref: '#/components/schemas/Flow.Cfm.Ccm.Flags'
          x-field-uid: 1
        sequence_number:
          x-field-pattern:
            description: >-
              CCM unique sequence number
            format: integer
            length: 32
            default: 0
            features:
              - count
          x-field-uid: 2
        ma_endpoint_identifier:
          x-field-pattern:
            description: >-
              Maintenance association endPoint identifier
            format: integer
            length: 16
            default: 0
            features:
              - count
          x-field-uid: 3
        ethernet_oam_protocol:
          $ref: '#/components/schemas/Flow.Cfm.OamProtocol'
          x-field-uid: 4
        tlvs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Cfm.Tlvs'
          x-field-uid: 5
    Flow.Cfm.Ccm.Flags:
      description: CCM flags are Remote Defect Indicator (RDI) and CCM Interval.
      type: object
      properties:
        rdi:
          x-field-pattern:
            description: >-
              Remote Defect Indicator (RDI) flag
            format: integer
            length: 1
            default: 0
            features: [count]
          x-field-uid: 1
        ccm_interval:
          x-field-pattern:
            description: >-
              CCM interval flag
            format: integer
            length: 3
            default: 0
            features: [count]
          x-field-uid: 2
    Flow.Cfm.OamProtocol:
      description: Ethernet OAM standard. Currently only Connectivity Fault Management
        (CFM) is supported.
      type: object
      properties:
        choice:
            type: string
            default: cfm
            x-field-uid: 1
            x-enum:
              cfm:
                x-field-uid: 1
        cfm:
          $ref: '#/components/schemas/Flow.Cfm.Cfm'
          x-field-uid: 2
    Flow.Cfm.Cfm:
      description: Connectivity Fault Management
      type: object
      properties:
        md_name:
          $ref: '#/components/schemas/Flow.Cfm.MDName'
          x-field-uid: 1
        short_ma_name_format:
          description: >-
            Short MA name format
          type: string
          default: char_str
          x-enum:
            primary_vid:
              x-field-uid: 1
            char_str:
              x-field-uid: 2
            two_oct_int:
              x-field-uid: 3
            rfc_2685_vpn_id:
              x-field-uid: 4
          x-field-uid: 2
        short_ma_name_length:
          x-field-pattern:
            description: >-
              Short MA name length
            format: integer
            length: 8
            default: 1
            features:
              - count
          x-field-uid: 3
        short_ma_name:
          description: >-
            Short MA name
          type: string
          format: hex
          default: '00'
          x-field-uid: 4
    Flow.Cfm.MDName:
      description: >-
        Maintenance domain name, can be auto or specified
      type: object
      properties:
        choice:
          type: string
          default: auto
          x-enum:
            auto:
              x-field-uid: 1
            specified:
              x-field-uid: 2
          x-field-uid: 1
        specified:
          $ref: '#/components/schemas/Flow.Cfm.MDNameSpecified'
          x-field-uid: 2
    Flow.Cfm.MDNameSpecified:
      description: >-
        Maintenance domain name
      type: object
      properties:
        md_name_format:
          description: >-
            Maintenance domain name format
          type: string
          default: char_str
          x-enum:
            domain_name_str:
              x-field-uid: 1
            mac_addr:
              x-field-uid: 2
            char_str:
              x-field-uid: 3
          x-field-uid: 1
        md_name_length:
          x-field-pattern:
            description: >-
              Maintenance domain name length
            format: integer
            length: 8
            default: 1
            features: [count]
          x-field-uid: 2
        md_name:
          description: >-
            Maintenance domain name
          type: string
          format: hex
          default: '00'
          x-field-uid: 3
    Flow.Cfm.Lbm:
      description: Loopback Message (LBM) is a diagnostic frame used to verify connectivity between
        Maintenance End Points (MEPs) and Maintenance Intermediate Points (MIPs).
        LBM flag bits are reserved and set to zero.
      type: object
      properties:
        transaction_id:
          x-field-pattern:
            description: >-
              Transaction id or sequence number to detect out-of-order packets.
            format: integer
            length: 32
            default: 0
            features:
              - count
          x-field-uid: 1
        tlvs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Cfm.Tlvs'
          x-field-uid: 2
    Flow.Cfm.Lbr:
      description: Loopback Reply (LBR) messages are unicast frames sent by a Maintenance Association
        End Point (MEP) or Intermediate Point (MIP) to a source MEP in response to a Loopback Message (LBM).
        LBR flag bits are reserved and set to zero.
      type: object
      properties:
        transaction_id:
          x-field-pattern:
            description: >-
              Transaction id or sequence number copied from the LBM to match the reply to the specific request.
            format: integer
            length: 32
            default: 0
            features:
              - count
          x-field-uid: 1
        tlvs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Flow.Cfm.Tlvs'
          x-field-uid: 2
    Flow.Cfm.Tlvs:
      description: The CFM TLV format is defined in 8021Q. Common fields are
        Type (1 octet) defined by choice below, Length (2 octet) and Value (variable)
        defined for each tlv type.
      type: object
      properties:
        choice:
          type: string
          default: sender_id
          x-field-uid: 1
          x-enum:
            sender_id:
              x-field-uid: 1
            port_status:
              x-field-uid: 2
            interface_status:
              x-field-uid: 3
            data:
              x-field-uid: 4
        length:
          x-field-pattern:
            description: Specifies the length of the tlv data in octets.
            format: integer
            length: 16
            default: 0
            features: [auto, count]
          x-field-uid: 2
        sender_id:
          $ref: '#/components/schemas/Flow.Cfm.SenderIdTlv'
          x-field-uid: 3
        port_status:
          $ref: '#/components/schemas/Flow.Cfm.PortStatusTlv'
          x-field-uid: 4
        interface_status:
          $ref: '#/components/schemas/Flow.Cfm.InterfaceStatusTlv'
          x-field-uid: 5
        data:
          $ref: '#/components/schemas/Flow.Cfm.DataTlv'
          x-field-uid: 6
    Flow.Cfm.SenderIdTlv:
      description: Sender id
      type: object
      properties:
        chassis_id_length:
          x-field-pattern:
            description: Specifies the length of the chassis ID field.
            format: integer
            length: 8
            default: 1
            features: [count]
          x-field-uid: 1
        chassis_id_subtype:
          description: Specifies the Type of chassis ID.
          type: string
          default: mac_address
          x-enum:
            chassis_component:
              x-field-uid: 1
            interface_alias:
              x-field-uid: 2
            port_component:
              x-field-uid: 3
            mac_address:
              x-field-uid: 4
            network_address:
              x-field-uid: 5
            interface_name:
              x-field-uid: 6
            locally_assigned:
              x-field-uid: 7
          x-field-uid: 2
        chassis_id:
          description: >-
            Chassis ID
          type: string
          format: hex
          default: '00'
          x-field-uid: 3
        management_address_domain_length:
          x-field-pattern:
            description: Specifies the length of the management address domain.
            format: integer
            length: 8
            default: 1
            features: [count]
          x-field-uid: 4
        management_address:
          description: >-
            Management address domain
          type: string
          format: hex
          default: '00'
          x-field-uid: 5
        management_address_length:
          x-field-pattern:
            description: Specifies the length of the management address.
            format: integer
            length: 8
            default: 1
            features: [count]
          x-field-uid: 6
        management_address:
          description: >-
            Management address
          type: string
          format: hex
          default: '00'
          x-field-uid: 7
    Flow.Cfm.PortStatusTlv:
      description: Port status
      type: object
      properties:
        status:
          description: Port status can be either port blocked or port up
          type: string
          default: port_up
          x-enum:
            port_blocked:
              x-field-uid: 1
            port_up:
              x-field-uid: 2
          x-field-uid: 1
    Flow.Cfm.InterfaceStatusTlv:
      description: Interface status
      type: object
      properties:
        status:
          description: Defined interface status
          type: string
          default: up
          x-enum:
            up:
              x-field-uid: 1
            down:
              x-field-uid: 2
            testing:
              x-field-uid: 3
            unknown:
              x-field-uid: 4
            dormant:
              x-field-uid: 5
            not_present:
              x-field-uid: 6
            lower_layer_down:
              x-field-uid: 7
          x-field-uid: 1
    Flow.Cfm.DataTlv:
      description: Data tlv
      type: object
      properties:
        data:
          description: String data for the tlv
          type: string
          format: hex
          default: '00'
          x-field-uid: 1