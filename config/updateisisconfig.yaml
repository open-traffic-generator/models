openapi: 3.0.3
info:
  title: Update IS-IS protocol Config
  description: >-
    Update IS-IS protocol Config for IS-IS control protocol schema.
  version: ^0.0.0
components:
  schemas:
    UpdateProtocol.Config.Isis:
      description: >-
        A container for IS-IS properties to be updated. Presence of this object
        indicates that one or more IS-IS properties require updating.
        The choice field selects the category of attributes to be updated.
        Router-level and interface-level updates are controlled independently.
      type: object
      properties:    
        routers:
          description: >-
            List of IS-IS router-level update entries. Populate this field to
            update router-level attributes independently of interface-level attributes.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Router.UpdateGroup'
          x-field-uid: 2
        interfaces:
          description: >-
            List of IS-IS interface update groups. IS-IS interface names are
            globally unique across all routers so no parent router name is required.
            Each update group applies a common set of property updates to one or
            more interfaces simultaneously. Use multiple update groups to handle
            asymmetric changes across different subsets of interfaces.
          type: array
          items:
            $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Interface.UpdateGroup'
          x-field-uid: 3

    UpdateProtocol.Config.Isis.Router.UpdateGroup:
      description: >-
        An update group that applies a common set of property updates to one or
        more IS-IS routers. All routers listed in names receive the same
        property updates defined in properties. Use multiple update groups in a
        single request to apply different property values to different subsets
        of routers (asymmetric updates).
      type: object
      properties:
        names:
          description: >-
            The names of the IS-IS routers to which all property updates in
            this group will be applied.
          type: array
          items:
            type: string
            x-constraint:
            - "/components/schemas/Isis.Router/properties/name"
          x-field-uid: 1
        choice:
          description: >-
            The category of router attributes to be updated. The properties
            field contains the actual attribute updates.
          type: string
          x-enum:
            basic:
              x-field-uid: 1
            advanced:
              x-field-uid: 2
            instance:
              x-field-uid: 3
          x-field-uid: 2
        basic:
          description: >-
            The rate at which LSPs are re-sent in seconds.
          $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Router.Basic.Attribute'
          x-field-uid: 3
        advanced:
          description: >-
            The advanced properties of an ISIS Router to be updated.
          $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Router.Advanced.Attribute'
          x-field-uid: 4
        instance_id:
          description: >-
            The instance properties for this emulated ISIS router.
          type: integer
          format: uint32
          default: 1
          x-field-uid: 5  

    UpdateProtocol.Config.Isis.Router.Basic.Attribute:
      description: >-
        The basic properties of an ISIS Router to be updated.
      type: object
      properties:
        learned_lsp_filter:
          description: >-
            Configuration for controlling storage of ISIS learned LSPs are received
            from the neighbors.
          type: boolean
          default: false
          x-field-uid: 1
        enable_wide_metric:
          description: >-
            When set to true, it allows sending of more detailed metric information  for
            the routes using 32-bit wide values using TLV 135 IP reachability and more
            detailed reachability information for IS reachability by using TLV 22.  The
            detailed usage is described in RFC3784.
          type: boolean
          default: true
          x-field-uid: 2

    UpdateProtocol.Config.Isis.Router.Advanced.Attribute:
      description: >-
        The advanced properties of an ISIS Router to be updated.
      type: object
      properties:
        enable_attached_bit:
          description: >-
            It enables the attached bit in IIH PDUs to indicate that the router is
            attached to other areas. This property is only applicable to level-1 and
            level-1-2 routers. Enabling this property on a level-2 router will result
            in an error.
          type: boolean
          default: false
          x-field-uid: 1
              
    UpdateProtocol.Config.Isis.Interface.UpdateGroup:
      description: >-
        An update group that applies a single attribute update to one or more
        IS-IS interfaces. All interfaces listed in names receive the same update
        selected by choice. Use multiple update groups in a single request to
        apply different attribute updates or different values to different subsets
        of interfaces.

        If the session is up but true on-the-fly update is not supported for the
        attribute (e.g. metric change on an emulated interface): a warning is
        returned indicating that the session will be disabled and re-enabled,
        and the updated attribute will be reflected once the session comes back up.
      type: object
      properties:
        names:
          description: >-
            The names of the IS-IS interfaces to which the attribute update
            will be applied.
          type: array
          items:
            type: string
            x-constraint:
            - "/components/schemas/Isis.Interface/properties/name"
          x-field-uid: 1
        choice:
          description: >-
            The attribute to be updated on the interface.
          type: string
          x-enum:
            metric:
              x-field-uid: 1
            priority:
              x-field-uid: 2
            traffic_engineering_metrics:
              x-field-uid: 3
          x-field-uid: 2
        metric:
          description: >-
            The metric value to be updated on the IS-IS interface.
            Updating the metric on an emulated interface will flap the IS-IS session.
            Updating the metric on a simulated interface will maintain the IS-IS session
            in Up state and trigger an LSP update with the new metric value sent to neighbors.
          type: integer
          format: uint32
          maximum: 16777215
          default: 10
          x-field-uid: 3
        priority:
          description: >-
            The priority value to be updated on the IS-IS interface.
          type: integer
          format: uint32
          maximum: 255
          default: 64
          x-field-uid: 4
        traffic_engineering_metrics:
          description: >-
            The traffic engineering metric values to be updated on the IS-IS interface.
          $ref: '#/components/schemas/UpdateProtocol.Config.Isis.Interface.TrafficEngineeringMetrics'
          x-field-uid: 5

    UpdateProtocol.Config.Isis.Interface.TrafficEngineeringMetrics:
      description: >-
        The traffic engineering metric values to be updated on the IS-IS interface.
      type: object
      properties:
        choice:
          description: >-
            The traffic engineering metric to be updated on the IS-IS interface.
          type: string
          x-enum:
            administrative_group:
              x-field-uid: 1
            metric_level:
              x-field-uid: 2
            max_bandwidth:
              x-field-uid: 3
          x-field-uid: 1
        administrative_group:
          description: >-
            TThe Administrative group sub-TLV (sub-TLV 3). It is a 4-octet 
            user-defined bit mask used to update administrative group numbers 
            to the interface.
          type: string
          format: hex
          default: '0000000'
          x-field-uid: 2
        metric_level:
          description: >-
            The user-assigned link metric to update for Traffic Engineering.
          type: integer
          format: uint32
          default: 0
          x-field-uid: 3
        max_bandwidth:
          description: >-
            The maximum link bandwidth (sub-TLV 9) in bytes/sec to update for this
            link for a direction.
          type: integer
          format: uint32
          default: 125000000
          x-field-uid: 4